<!DOCTYPE html>
<html dir="rtl" lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c1a2e">
<title>ڈیش بورڈ — ادارہ تحقیقات اسلامی</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --dk:#0c1a2e;--dk2:#132640;--dk3:#1a3350;
  --gd:#d4a017;--gd2:#f4c430;
  --gr:#34a853;--rd:#ea4335;--yl:#fbbc04;--bl:#4285f4;
  --wh:#fff;--lg:#f4f6f8;
}
body{font-family:'Noto Sans Arabic',sans-serif;background:var(--dk);color:var(--wh);min-height:100vh;direction:rtl;
  -webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
.container{max-width:1200px;margin:0 auto;padding:10px}
.header{background:linear-gradient(135deg,var(--dk2),var(--dk3));border-radius:16px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:18px;color:var(--gd);font-weight:800}
.header .sub{font-size:10px;color:#8a9ab5}
.header .live{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--gr)}
.header .live .dot{width:8px;height:8px;border-radius:50%;background:var(--gr);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Tabs — horizontal scroll on mobile */
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;
  -webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 16px;border-radius:20px;border:none;font-family:inherit;font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;transition:.2s;flex-shrink:0;scroll-snap-align:start;
  min-height:44px;display:flex;align-items:center}
.tab.active{background:var(--gd);color:var(--dk)}
.tab:not(.active){background:var(--dk3);color:#8a9ab5}
.tab:hover:not(.active){background:#1f3d5e}

/* Grid — 2 cols on mobile, 4 on desktop */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.card{background:var(--dk2);border-radius:14px;padding:14px;border:1px solid #1f3d5e}
.card .num{font-size:24px;font-weight:800;color:var(--gd)}
.card .lbl{font-size:9px;color:#8a9ab5;margin-top:3px}
.card.gr .num{color:var(--gr)}.card.rd .num{color:var(--rd)}.card.yl .num{color:var(--yl)}.card.bl .num{color:var(--bl)}

.section{background:var(--dk2);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid #1f3d5e}
.section h2{font-size:14px;font-weight:800;color:var(--gd);margin-bottom:10px;display:flex;align-items:center;gap:8px}

/* Tables — horizontal scroll */
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:var(--dk3);color:var(--gd);padding:10px 6px;text-align:center;font-weight:700;position:sticky;top:0;white-space:nowrap}
.tbl td{padding:8px 6px;text-align:center;border-bottom:1px solid #1a3350;white-space:nowrap}
.tbl tr:hover td{background:#1a3350}
.scroll-table{max-height:400px;overflow:auto;-webkit-overflow-scrolling:touch;border-radius:10px}

.badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:10px;font-weight:700}
.badge.p{background:#34a85322;color:var(--gr)}.badge.a{background:#ea433522;color:var(--rd)}
.badge.l{background:#fbbc0422;color:var(--yl)}.badge.late{background:#ff980022;color:#ff9800}
.badge.approved{background:#34a85322;color:var(--gr)}.badge.pending{background:#ff980022;color:#ff9800}

/* Buttons — min 44px touch target */
.btn{padding:10px 18px;border-radius:12px;border:none;font-family:inherit;font-size:12px;font-weight:700;
  cursor:pointer;transition:.2s;min-height:44px;display:inline-flex;align-items:center;justify-content:center}
.btn-gd{background:var(--gd);color:var(--dk)}.btn-gd:hover{background:var(--gd2)}
.btn-gr{background:var(--gr);color:#fff}.btn-rd{background:var(--rd);color:#fff}
.btn-bl{background:var(--bl);color:#fff}
.btn-sm{padding:6px 12px;font-size:10px;min-height:36px}

/* Call button — prominent on mobile */
.call-btn{background:var(--gr);color:#fff;border:none;padding:8px 14px;border-radius:10px;
  font-family:inherit;font-size:11px;cursor:pointer;text-decoration:none;
  display:inline-flex;align-items:center;gap:4px;min-height:36px}

.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.filter-bar select,.filter-bar input{background:var(--dk3);border:1px solid #1f3d5e;color:var(--wh);
  padding:8px 10px;border-radius:10px;font-family:inherit;font-size:11px;min-height:40px}
.filter-bar input[type=date]{direction:ltr;text-align:center}
.search{background:var(--dk3);border:1px solid #1f3d5e;color:var(--wh);padding:10px 14px;border-radius:12px;
  font-family:inherit;font-size:12px;width:100%;margin-bottom:10px;min-height:44px}

.current-period{background:linear-gradient(135deg,#1a5276,#1a2780);border-radius:14px;padding:14px;margin-bottom:12px;border:2px solid var(--gd)}
.current-period h2{color:var(--gd);font-size:14px;margin-bottom:10px}
.period-card{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--dk);border-radius:10px;margin-bottom:6px;min-height:48px}
.period-card .teacher{font-weight:700;font-size:12px}.period-card .subject{font-size:10px;color:#8a9ab5}
.class-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:9px;font-weight:700}
.oola{background:#fdebd033;color:#f39c12}.sania{background:#d6eaf833;color:#3498db}
.salisa{background:#e8daef33;color:#9b59b6}.rabia{background:#d1f2eb33;color:#1abc9c}
.khamisa{background:#fcf3cf33;color:#f1c40f}.fazilat{background:#fadbd833;color:#e74c3c}
.hifz{background:#eaecee33;color:#95a5a6}

/* Task items — big touch targets */
.task-item{background:var(--dk);border:1px solid #1f3d5e;border-radius:14px;padding:14px;margin-bottom:8px;
  display:flex;align-items:flex-start;gap:12px;min-height:60px;transition:.2s}
.task-item:active{transform:scale(0.98)}
.task-icon{font-size:24px;flex-shrink:0;width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;cursor:pointer}
.task-done{background:#34a85315;border-color:#34a85344}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--gd);color:var(--dk);
  padding:12px 28px;border-radius:14px;font-weight:700;font-size:13px;z-index:999;display:none;
  box-shadow:0 4px 20px rgba(0,0,0,.4)}
.loading{text-align:center;padding:40px;color:#8a9ab5;font-size:13px}

/* Desktop */
@media(min-width:768px){
  .grid{grid-template-columns:repeat(4,1fr)}
  .header h1{font-size:22px}
  .card .num{font-size:28px}
  .container{padding:16px}
}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading">⏳ لوڈ ہو رہا ہے...</div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const SB_URL = 'https://mhhifytmrlyksfrjacvi.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oaGlmeXRtcmx5a3NmcmphY3ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTExNTAsImV4cCI6MjA4OTc2NzE1MH0.RIkSQq1Q7qLO_tVqklGV_KZabcKYfqqBFd7SLKpBE_Y';
const PRINCIPAL_PHONE = '';  // Set principal phone number here
const CLASS_UR = {oola:'اولیٰ',sania:'ثانیہ',salisa:'ثالثہ',rabia:'رابعہ',khamisa:'خامسہ',fazilat:'فضیلت',hifz:'حفظ'};
/** Grade order for معائنہ cards (matches درجہ dropdown — not save-time order). */
const CLASS_ORDER = Object.keys(CLASS_UR);
const TODAY = new Date().toISOString().split('T')[0];

// ═══════════════════════════════════════════
// SUPABASE HELPERS
// ═══════════════════════════════════════════
const headers = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
async function sb(table, params='') {
  const r = await fetch(SB_URL+'/rest/v1/'+table+'?'+params, {headers:{'apikey':SB_KEY}});
  if (!r.ok) throw new Error(r.status+' '+r.statusText);
  return r.json();
}
async function sbPatch(table, filter, data) {
  const r = await fetch(SB_URL+'/rest/v1/'+table+'?'+filter, {
    method:'PATCH', headers:{...headers,'Prefer':'return=minimal'}, body:JSON.stringify(data)
  });
  return r.ok;
}
function toast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}
function now() {
  const d=new Date();
  return d.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'});
}
function todayIST() {
  return new Date().toLocaleDateString('ur-PK',{weekday:'long',year:'numeric',month:'long',day:'numeric',timeZone:'Asia/Kolkata'});
}

// ═══════════════════════════════════════════
// LOAD ALL DATA
// ═══════════════════════════════════════════
let DATA = {};
async function loadAll() {
  try {
    const [teachers,subjects,students,periods,assignments,
           tAttToday,sAttToday,dAttToday,reportsToday] = await Promise.all([
      sb('teachers','select=*&order=id'),
      sb('subjects','select=*&order=id'),
      sb('students','select=*&order=name'),
      sb('periods','select=*&order=id'),
      sb('assignments','select=*&order=period_id'),
      sb('teacher_attendance','select=*&date=eq.'+TODAY),
      sb('student_attendance','select=*&date=eq.'+TODAY+'&order=created_at.desc&limit=500'),
      sb('daily_attendance','select=*&date=eq.'+TODAY+'&order=created_at.desc&limit=500'),
      sb('daily_reports','select=*&date=eq.'+TODAY),
    ]);
    // These may fail if tables are new/empty — load separately
    let leaveSummary=[],adminTasks=[],adminScores=[],adminReport=null;
    try { leaveSummary = await sb('teacher_leave_summary','select=*'); } catch(e) { console.warn('leave_summary:',e); }
    try { adminTasks = await sb('admin_tasks','select=*&date=eq.'+TODAY); } catch(e) { console.warn('admin_tasks:',e); }
    try { adminScores = await sb('admin_daily_score','select=*&limit=14&order=date.desc'); } catch(e) { console.warn('admin_scores:',e); }
    try { const ar = await sb('admin_accountability','select=*&date=eq.'+TODAY); adminReport = ar.length?ar[0]:null; } catch(e) { console.warn('admin_report:',e); }
    DATA = {teachers,subjects,students,periods,assignments,tAttToday,sAttToday,dAttToday,reportsToday,leaveSummary,adminTasks,adminScores,adminReport};
    return DATA;
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="loading">❌ Supabase سے رابطہ ناکام<br><small>'+e.message+'</small></div>';
    throw e;
  }
}

// ═══════════════════════════════════════════
// CURRENT PERIOD CALCULATION
// ═══════════════════════════════════════════
function getCurrentPeriod(periods) {
  const t = now();
  for (const p of periods) {
    if (p.type === 'break') continue;
    // Convert times like "10:00" to comparable format
    const s = p.start_time.padStart(5,'0');
    const e = p.end_time.padStart(5,'0');
    if (t >= s && t < e) return p;
  }
  return null;
}

function escHtml(t) {
  return String(t == null ? '' : t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function subjectClassId(sub) {
  return (sub && (sub.class || sub.class_id || '')) || '';
}

function findAssignmentForClassPeriod(assignments, subjects, classId, periodId) {
  if (periodId == null) return null;
  return (assignments || []).find(a => {
    if (Number(a.period_id) !== Number(periodId)) return false;
    const sub = subjects.find(s => s.id === a.subject_id);
    return sub && subjectClassId(sub) === classId;
  }) || null;
}

/** First timetable slot (by period id) that has an assignment for this class */
function firstAssignmentForClass(assignments, subjects, periods, classId) {
  const teaching = (periods || []).filter(p => p.type !== 'break').sort((a, b) => Number(a.id) - Number(b.id));
  for (const p of teaching) {
    const asg = findAssignmentForClassPeriod(assignments, subjects, classId, p.id);
    if (asg) return { period: p, assignment: asg };
  }
  return null;
}

/** Prefer current period’s lesson for this class; else first slot of the day for that class */
function resolveClassInspectionSlot(periods, assignments, subjects, classId) {
  const cur = getCurrentPeriod(periods || []);
  if (cur) {
    const asg = findAssignmentForClassPeriod(assignments, subjects, classId, cur.id);
    if (asg) return { period: cur, assignment: asg, when: 'current' };
  }
  const fb = firstAssignmentForClass(assignments, subjects, periods, classId);
  if (fb) return { ...fb, when: 'scheduled' };
  return null;
}

const VISIT_OBS_TAG = '[[VISIT_OBS class=';
const VISIT_OBS_CLOSE = '[[/VISIT_OBS]]';

function parseVisitObservations(raw) {
  const s = typeof raw === 'string' ? raw : '';
  if (!s.trim()) return [];
  if (s.indexOf(VISIT_OBS_TAG) === -1) return [{ classId: '', text: s.trim(), legacy: true }];
  const out = [];
  const re = /\[\[VISIT_OBS class=([a-zA-Z0-9_]+)\]\]([\s\S]*?)\[\[\/VISIT_OBS\]\]/g;
  let m;
  while ((m = re.exec(s))) out.push({ classId: m[1], text: (m[2] || '').trim() });
  return out;
}

/** Legacy blob first; then each grade in CLASS_ORDER; unknown ids last. */
function sortVisitObservationsForDisplay(visits) {
  if (!visits || !visits.length) return [];
  const legacy = visits.filter(v => v.legacy);
  const rest = visits.filter(v => !v.legacy);
  const rank = new Map(CLASS_ORDER.map((id, i) => [id, i]));
  rest.sort((a, b) => {
    const ar = rank.has(a.classId) ? rank.get(a.classId) : 999;
    const br = rank.has(b.classId) ? rank.get(b.classId) : 999;
    if (ar !== br) return ar - br;
    return String(a.classId).localeCompare(String(b.classId));
  });
  return legacy.concat(rest);
}

function serializeVisitObservations(arr) {
  const sorted = sortVisitObservationsForDisplay(arr || []);
  return sorted
    .filter(v => v && v.classId && (v.text || '').trim())
    .map(v => VISIT_OBS_TAG + v.classId + ']]\n' + (v.text || '').trim() + '\n' + VISIT_OBS_CLOSE)
    .join('\n\n');
}

function classObsScoringOk(raw) {
  const s = (raw || '').trim();
  if (!s) return false;
  if (s.indexOf(VISIT_OBS_TAG) === -1) return s.length >= 10;
  const visits = parseVisitObservations(raw);
  const total = visits.reduce((a, v) => a + ((v.text || '').trim().length), 0);
  return visits.length > 0 && total >= 10;
}

function formatVisitObsCardBody(v, omitGradeBadge) {
  const title = v.legacy ? 'پرانا نوٹ' : (CLASS_UR[v.classId] || v.classId);
  const bid = v.legacy ? '' : v.classId;
  const delArg = v.legacy ? "''" : "'" + bid + "'";
  const edCall = v.legacy ? "''" : "'" + bid + "'";
  const head = omitGradeBadge && !v.legacy
    ? `<div style="display:flex;justify-content:flex-end;align-items:center;gap:4px;margin-bottom:6px">
        <button type="button" class="btn btn-sm" style="font-size:9px;padding:4px 8px;min-height:32px" onclick="window.editClassVisitObs(${edCall})">\u062A\u062F\u0648\u06CC\u0646</button>
        <button type="button" class="btn btn-rd btn-sm" style="font-size:9px;padding:4px 8px;min-height:32px" onclick="window.removeClassVisitObs(${delArg})">\u062D\u0630\u0641</button>
      </div>`
    : `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px">
        <span class="class-badge ${bid}">${escHtml(title)}</span>
        <span style="display:flex;gap:4px;flex-shrink:0">
          <button type="button" class="btn btn-sm" style="font-size:9px;padding:4px 8px;min-height:32px" onclick="window.editClassVisitObs(${edCall})">\u062A\u062F\u0648\u06CC\u0646</button>
          <button type="button" class="btn btn-rd btn-sm" style="font-size:9px;padding:4px 8px;min-height:32px" onclick="window.removeClassVisitObs(${delArg})">\u062D\u0630\u0641</button>
        </span>
      </div>`;
  return `<div style="border:1px solid #1f3d5e;border-radius:10px;padding:10px;background:var(--dk)">${head}
    <div style="font-size:11px;white-space:pre-wrap;color:#c5cee0;max-height:160px;overflow-y:auto">${escHtml(v.text || '')}</div>
  </div>`;
}

/** One row per grade in CLASS_ORDER: note under its درجہ heading (not random save order). */
function formatVisitObsCardsHtml(visits) {
  const sorted = sortVisitObservationsForDisplay(visits.slice());
  const legacy = sorted.filter(v => v.legacy);
  const byGrade = new Map(sorted.filter(v => !v.legacy).map(v => [v.classId, v]));
  const known = new Set(CLASS_ORDER);
  const extras = sorted.filter(v => !v.legacy && !known.has(v.classId));

  if (!legacy.length && !byGrade.size && !extras.length) {
    return '<span style="color:#8a9ab5;font-size:11px">ابھی کوئی درجہ وار معائنہ نوٹ نہیں — اوپر درجہ منتخب کر کے نیچے تفصیل لکھیں</span>';
  }

  const blocks = [];
  legacy.forEach(v => {
    blocks.push(`<div style="margin-bottom:14px"><div style="font-size:10px;color:#8a9ab5;margin-bottom:6px">\u067E\u0631\u0627\u0646\u0627 \u0645\u062A\u0646 (\u062F\u0631\u062C\u06D2 \u0648\u0627\u0631 \u0646\u06C1\u06CC\u06BA)</div>${formatVisitObsCardBody(v)}</div>`);
  });

  for (const cid of CLASS_ORDER) {
    const v = byGrade.get(cid);
    if (!v) continue;
    const name = CLASS_UR[cid] || cid;
    blocks.push(`<div style="margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #243652">
      <div style="font-weight:800;font-size:12px;color:var(--gd);margin-bottom:8px;display:flex;align-items:center;gap:8px"><span class="class-badge ${cid}">${escHtml(name)}</span></div>
      ${formatVisitObsCardBody(v, true)}
    </div>`);
  }

  extras.forEach(v => {
    const name = CLASS_UR[v.classId] || v.classId;
    const xid = v.classId;
    blocks.push(`<div style="margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #243652">
      <div style="font-weight:800;font-size:12px;color:var(--gd);margin-bottom:8px"><span class="class-badge ${xid}">${escHtml(name)}</span></div>
      ${formatVisitObsCardBody(v, true)}
    </div>`);
  });

  return blocks.join('');
}

/** Teachers with an assignment today who have not submitted a daily_report for that subject; skips absent/leave. */
function pendingDailyReports(assignments, reportsToday, tAttToday, teachers, subjects) {
  const submitted = new Set((reportsToday || []).map(r => (r.teacher_id || '') + '|' + (r.subject_id || '')));
  const skipT = new Set();
  (tAttToday || []).forEach(r => {
    if (r && (r.status === 'absent' || r.status === 'leave')) skipT.add(r.teacher_id);
  });
  const miss = [];
  const seen = new Set();
  for (const a of assignments || []) {
    const tid = a.teacher_id;
    const sid = a.subject_id;
    if (!tid || !sid) continue;
    if (skipT.has(tid)) continue;
    const k = tid + '|' + sid;
    if (submitted.has(k)) continue;
    if (seen.has(k)) continue;
    seen.add(k);
    const te = teachers.find(x => x.id === tid);
    const su = subjects.find(x => x.id === sid);
    if (!su) continue;
    miss.push({ k, tname: te ? te.name : tid, subn: su.name || sid, cls: su.class, p: a.period_id });
  }
  miss.sort((x, y) => (x.tname + x.subn).localeCompare(y.tname + y.subn, 'ur'));
  return miss;
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
let activeTab = 'overview';
/**
 * Internal tab id for ذمہ داریاں on **this** page (`dashboard.html` — principal / Supabase dashboard).
 * Not a screen inside the teacher PWA (`index.html`); the id is historical only.
 */
const TAB_ACCOUNTABILITY = 'admin';
/** Student attendance tab filters — `var` so inline onchange/oninput can see it */
var sAttendUi = { class: 'all', status: 'all', search: '' };

function escAttr(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function sAttendRowClass(r, students) {
  const c = r.class;
  if (c != null && String(c).trim() !== '') return String(c).trim();
  const st = students.find(x => x.id === r.student_id);
  return st && st.class ? String(st.class).trim() : '';
}

function sAttendInferPeriod(r, assignments) {
  const raw = r.period_id;
  if (raw != null && raw !== '' && !Number.isNaN(Number(raw))) return Number(raw);
  const a = (assignments || []).find(x => x.teacher_id === r.teacher_id && x.subject_id === r.subject_id);
  if (a && a.period_id != null && a.period_id !== '' && !Number.isNaN(Number(a.period_id))) return Number(a.period_id);
  return null;
}

function sAttendGroupKey(r, assignments) {
  const p = sAttendInferPeriod(r, assignments);
  const pPart = p == null ? 'null' : String(p);
  return pPart + '|' + (r.subject_id || '') + '|' + (r.teacher_id || '');
}

/** Before `innerHTML` rebuild: unsaved جوابدہی fields on the principal dashboard (auto-refresh / loadAll). */
function captureAccountabilityDraft() {
  const ta = document.getElementById('acc_class_visited');
  if (!ta) return null;
  const valueIds = ['acc_absent','acc_behind','acc_coverage','acc_inspect_class_sel','acc_class_visited','acc_visit_obs_input','acc_class_obs','acc_absent_actions','acc_syllabus','acc_hifz','acc_remarks'];
  const values = {};
  valueIds.forEach(id => {
    const el = document.getElementById(id);
    if (el && 'value' in el) values[id] = el.value;
  });
  const checks = {};
  ['acc_chk_parents','acc_chk_hifz','acc_chk_thu'].forEach(id => {
    const el = document.getElementById(id);
    if (el) checks[id] = !!el.checked;
  });
  return { values, checks };
}

function restoreAccountabilityDraft(draft) {
  if (!draft || !draft.values) return;
  Object.keys(draft.values).forEach(id => {
    const el = document.getElementById(id);
    if (el && 'value' in el) el.value = draft.values[id];
  });
  Object.keys(draft.checks || {}).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.checked = draft.checks[id];
  });
}

  window.updateAccClassVisitedCounter && window.updateAccClassVisitedCounter();

      <textarea id="acc_visit_obs_input" rows="4" placeholder="\u0627\u0633 \u062F\u0631\u062C\u06D2 \u0645\u06CC\u06BA \u062A\u062F\u0631\u06CC\u0633\u060C \u0637\u0644\u0628\u0627 \u06A9\u06CC \u062A\u0648\u062C\u06C1\u060C \u0646\u0638\u0645 \u0648 \u0636\u0628\u0637..." style="${iS('margin-bottom:8px;')}"></textarea>
      <button type="button" class="btn btn-gd" style="width:100%;margin-bottom:12px;min-height:44px" onclick="window.saveClassVisitObservation&&window.saveClassVisitObservation()">\uD83D\uDCBE \u0627\u0633 \u062F\u0631\u062C\u06D2 \u06A9\u0627 \u0645\u0639\u0627\u0626\u0646\u06C1 \u0646\u0648\u0679 \u0645\u062D\u0641\u0648\u0638 \u06A9\u0631\u06CC\u06BA</button>
      <div id="acc_visits_list" style="margin-bottom:4px">${formatVisitObsCardsHtml(visits0)}</div>
      <textarea id="acc_class_obs" style="display:none" tabindex="-1" aria-hidden="true">${escHtml(coRaw)}</textarea>
    </div>`;

    const descFields = [
      {id:'acc_absent_actions', label:'📞 غائب طلبا — کیا اقدام کیا؟', field:'absent_actions', ph:'کن والدین کو فون کیا، کیا جواب ملا...', rows:3, min:10},
      {id:'acc_syllabus', label:'📚 نصاب پیشرفت نوٹس', field:'syllabus_notes', ph:'کون سے مضامین پیچھے ہیں، کیا منصوبہ ہے...', rows:3, min:10},
      {id:'acc_hifz', label:'📖 حفظ اپڈیٹ — قاری صاحبان سے', field:'hifz_notes', ph:'کس طالب علم نے کتنا حفظ کیا، کوئی مسئلہ...', rows:3, min:10},
      {id:'acc_remarks', label:'💬 عمومی ملاحظات', field:'general_remarks', ph:'آج کا کوئی خاص واقعہ، تجویز، شکایت...', rows:2, min:5},
    ];
    descFields.forEach(f => {
      const val = rpt[f.field] || '';
      const ok = val.length >= f.min;
      html += `<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <label style="font-size:12px;font-weight:700">${f.label}</label>
          <span style="font-size:9px;color:${ok?'var(--gr)':'#8a9ab5'}">${val.length}/${f.min} ${ok?'✅':''}</span>
        </div>
        <textarea id="${f.id}" rows="${f.rows}" placeholder="${f.ph}" style="${iS('resize:vertical;')}">${val}</textarea>
      </div>`;
    });
    html += '</div>';

    // ═══ Section D: Checklist ═══
    html += '<div class="section"><h2>✅ چیک لسٹ</h2>';
    const checks = [
      {id:'acc_chk_parents', label:'📞 غائب طلبا کے والدین کو فون کیا', field:'called_parents'},
      {id:'acc_chk_hifz', label:'📖 حفظ پیشرفت خود دیکھی', field:'checked_hifz'},
    ];
    if (isThursday) checks.push({id:'acc_chk_thu', label:'✍️ جمعرات امتحانی نتائج دیکھے', field:'reviewed_thursday'});
    checks.forEach(c => {
      const ck = rpt[c.field] ? 'checked' : '';
      html += `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--dk);border-radius:10px;margin-bottom:6px;min-height:48px;cursor:pointer" onclick="document.getElementById('${c.id}').click()">
        <input type="checkbox" id="${c.id}" ${ck} style="width:22px;height:22px;accent-color:var(--gr)" onclick="event.stopPropagation()">
        <label style="font-size:12px;font-weight:700;cursor:pointer" for="${c.id}">${c.label}</label>
      </div>`;
    });
    html += '</div>';

    // ═══ Submit Button ═══
    html += `<div style="padding:0 12px;margin-bottom:20px">
      <button onclick="submitAccountability()" class="btn btn-gr" style="width:100%;padding:16px;font-size:16px;font-weight:800;border-radius:14px;border:none;cursor:pointer">
        📤 ${isSubmitted?'اپڈیٹ کریں':'رپورٹ جمع کرائیں'}
      </button>
    </div>`;

    // ═══ Historical Scores ═══
    if (adminScores.length > 0) {
      html += '<div class="section"><h2>📈 پچھلے دنوں کی جوابدہی</h2>';
      html += '<div class="scroll-table"><table class="tbl"><thead><tr>';
      html += '<th>تاریخ</th><th>مکمل</th><th>کل</th><th>سکور</th><th>وقت</th>';
      html += '</tr></thead><tbody>';
      adminScores.forEach(s => {
        const sc = parseInt(s.score_pct||0);
        const c = sc>=80?'var(--gr)':sc>=50?'var(--yl)':'var(--rd)';
        html += `<tr>
          <td>${s.date}</td>
          <td>${s.completed_tasks}</td>
          <td>${s.total_tasks}</td>
          <td style="font-weight:800;color:${c}">${sc}%</td>
          <td style="font-size:9px">${s.submitted_at?new Date(s.submitted_at).toLocaleTimeString('ur-PK',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'}):'-'}</td>
        </tr>`;
      });
      html += '</tbody></table></div></div>';
    }

    } catch(err) {
      console.error('Admin tab error:', err);
      html += `<div class="section" style="border:2px solid var(--rd)"><h2>❌ خرابی</h2>
        <div style="font-size:11px;color:var(--rd)">${err.message}</div>
        <div style="font-size:10px;color:#8a9ab5;margin-top:8px">Console (F12) میں تفصیل دیکھیں</div>
      </div>`;
    }
  }

  // ═══════════════════════════════════════════
  // TAB: TEACHER ATTENDANCE
  // ═══════════════════════════════════════════
  if (activeTab === 'tAttend') {
    html += '<div class="section"><h2>👨‍🏫 اساتذہ کی آج کی حاضری</h2>';

    // Leave summary
    html += '<div class="grid" style="margin-bottom:16px">';
    teachers.forEach(t => {
      const att = tAttToday.find(r=>r.teacher_id===t.id);
      const ls = (DATA.leaveSummary||[]).find(r=>r.teacher_id===t.id);
      const status = att ? att.status : '—';
      const badgeCls = status==='present'?'p':status==='absent'?'a':status==='leave'?'l':status==='late'?'late':'';
      const approved = att ? att.approved : false;
      html += `<div class="card" style="border-right:4px solid ${status==='present'?'var(--gr)':status==='absent'?'var(--rd)':status==='leave'?'var(--bl)':'#555'}">
        <div style="font-weight:700;font-size:13px;margin-bottom:4px">${t.name}</div>
        <div><span class="badge ${badgeCls}">${status==='present'?'حاضر':status==='absent'?'غائب':status==='leave'?'رخصت':status==='late'?'تاخیر':'نامعلوم'}</span>
          ${att ? `<span class="badge ${approved?'approved':'pending'}" style="margin-right:4px">${approved?'✓ منظور':'⏳ زیر التوا'}</span>` : ''}
        </div>
        ${ls ? `<div style="font-size:9px;color:#8a9ab5;margin-top:6px">حاضر:${ls.present_days||0} رخصت:${ls.leave_days||0} غائب:${ls.absent_days||0} تاخیر:${ls.late_days||0}</div>` : ''}
        ${att && !approved ? `<button class="btn btn-gr btn-sm" style="margin-top:6px" onclick="approveTeacher('${t.id}')">✅ منظور</button>` : ''}
      </div>`;
    });
    html += '</div>';

    // Approve All
    const pending = tAttToday.filter(r=>!r.approved);
    if (pending.length) {
      html += `<button class="btn btn-gd" onclick="approveAll()">✅ سب منظور کریں (${pending.length})</button>`;
    }
    html += '</div>';
  }

  // ═══════════════════════════════════════════
  // TAB: STUDENT ATTENDANCE
  // ═══════════════════════════════════════════
  if (activeTab === 'sAttend') {
    html += '<div class="section"><h2>👥 آج طلبا کی حاضری</h2>';

    html += '<div class="filter-bar">';
    html += '<select id="sClassFilter" onchange="sAttendUi.class=this.value;render();">';
    html += `<option value="all"${sAttendUi.class === 'all' ? ' selected' : ''}>سب درجے</option>`;
    Object.keys(CLASS_UR).forEach(c => {
      html += `<option value="${c}"${sAttendUi.class === c ? ' selected' : ''}>${CLASS_UR[c]}</option>`;
    });
    html += '</select>';
    html += '<select id="sStatusFilter" onchange="sAttendUi.status=this.value;render();">';
    html += `<option value="all"${sAttendUi.status === 'all' ? ' selected' : ''}>سب</option>`;
    html += `<option value="P"${sAttendUi.status === 'P' ? ' selected' : ''}>حاضر</option>`;
    html += `<option value="A"${sAttendUi.status === 'A' ? ' selected' : ''}>غائب</option>`;
    html += `<option value="L"${sAttendUi.status === 'L' ? ' selected' : ''}>رخصت</option>`;
    html += '</select>';
    html += `<input type="search" id="sSearch" placeholder="🔍 نام تلاش..." value="${escAttr(sAttendUi.search)}" oninput="sAttendUi.search=this.value;render();" style="flex:1;min-width:120px">`;
    html += '</div>';

    const classF = sAttendUi.class;
    const statusF = sAttendUi.status;
    const searchF = (sAttendUi.search || '').toLowerCase().trim();

    let filtered = sAttToday.slice();
    if (classF !== 'all') filtered = filtered.filter(r => sAttendRowClass(r, students) === classF);
    if (statusF !== 'all') filtered = filtered.filter(r => r.status === statusF);
    if (searchF) {
      filtered = filtered.filter(r => {
        const st = students.find(s => s.id === r.student_id);
        const nm = (st && st.name) ? st.name.toLowerCase() : '';
        return nm.includes(searchF) || String(r.student_id).toLowerCase().includes(searchF);
      });
    }

    filtered.sort((a, b) => {
      const pa = sAttendInferPeriod(a, assignments);
      const pb = sAttendInferPeriod(b, assignments);
      const na = pa == null ? 1e6 : pa;
      const nb = pb == null ? 1e6 : pb;
      if (na !== nb) return na - nb;
      const sCmp = (a.subject_name || '').localeCompare(b.subject_name || '', 'ur');
      if (sCmp) return sCmp;
      const tCmp = (a.teacher_name || '').localeCompare(b.teacher_name || '', 'ur');
      if (tCmp) return tCmp;
      const sta = students.find(s => s.id === a.student_id);
      const stb = students.find(s => s.id === b.student_id);
      return (sta && sta.name || '').localeCompare(stb && stb.name || '', 'ur');
    });

    const groups = [];
    let cur = null;
    for (const r of filtered) {
      const gk = sAttendGroupKey(r, assignments);
      if (!cur || cur.gk !== gk) {
        cur = {
          gk,
          pNum: sAttendInferPeriod(r, assignments),
          subject_name: r.subject_name || '',
          teacher_name: r.teacher_name || '',
          rows: []
        };
        groups.push(cur);
      }
      cur.rows.push(r);
    }

    const fP = filtered.filter(r => r.status === 'P').length;
    const fA = filtered.filter(r => r.status === 'A').length;
    const fL = filtered.filter(r => r.status === 'L').length;
    html += `<div style="display:flex;gap:12px;margin-bottom:10px;font-size:11px;flex-wrap:wrap">
      <span style="color:var(--gr)">✅ حاضر: ${fP}</span>
      <span style="color:var(--rd)">❌ غائب: ${fA}</span>
      <span style="color:var(--yl)">📝 رخصت: ${fL}</span>
      <span style="color:#8a9ab5">کل: ${filtered.length}</span>
      ${classF !== 'all' ? `<span style="color:var(--gd)">درجہ: ${CLASS_UR[classF] || classF}</span>` : ''}
    </div>`;

    if (!filtered.length) {
      html += '<div style="text-align:center;padding:24px;color:#8a9ab5;font-size:12px">اس فلٹر کے لیے کوئی اندراج نہیں۔</div>';
    } else {
      groups.forEach(g => {
        const pLabel = g.pNum == null ? 'پیریڈ ؟' : ('پیریڈ ' + g.pNum);
        html += '<div style="margin-bottom:14px;border:1px solid #1f3d5e;border-radius:12px;overflow:hidden">';
        html += `<div style="background:var(--dk3);padding:10px 12px;font-size:12px;font-weight:800;color:var(--gd)">
          🕐 ${pLabel} — ${g.subject_name || '—'} — ${g.teacher_name || '—'}
          <span style="font-weight:600;color:#8a9ab5;font-size:10px;margin-right:8px">(${g.rows.length})</span>
        </div>`;
        html += '<div class="scroll-table" style="max-height:260px"><table class="tbl"><thead><tr>';
        html += '<th>طالب علم</th><th>درجہ</th><th>حاضری</th><th>رابطہ</th>';
        html += '</tr></thead><tbody>';
        g.rows.forEach(r => {
          const st = students.find(s => s.id === r.student_id);
          const phone = st && st.phone ? st.phone : '';
          const rc = sAttendRowClass(r, students);
          html += `<tr>
            <td style="font-weight:700">${st ? st.name : r.student_id}</td>
            <td><span class="class-badge ${rc}">${CLASS_UR[rc] || rc || ''}</span></td>
            <td><span class="badge ${r.status.toLowerCase()}">${r.status === 'P' ? 'حاضر' : r.status === 'A' ? 'غائب' : 'رخصت'}</span></td>
            <td>${phone ? `<a href="tel:${phone}" class="call-btn">📞</a>` : ''}</td>
          </tr>`;
        });
        html += '</tbody></table></div></div>';
      });
    }
    html += '</div>';
  }

  // ═══════════════════════════════════════════
  // TAB: DAILY REPORTS
  // ═══════════════════════════════════════════
  if (activeTab === 'reports') {
    html += '<div class="section"><h2>📝 آج کی یومیہ رپورٹس</h2>';
    if (reportsToday.length) {
      html += '<div class="scroll-table"><table class="tbl"><thead><tr>';
      html += '<th>استاذ</th><th>مضمون</th><th>درجہ</th><th>ہدف</th><th>اصل</th><th>فرق</th><th>مکمل</th>';
      html += '</tr></thead><tbody>';
      reportsToday.forEach(r => {
        const diff = (r.actual_page||0) - (r.target_page||0);
        const diffColor = diff >= 0 ? 'var(--gr)' : diff >= -3 ? 'var(--yl)' : 'var(--rd)';
        html += `<tr>
          <td>${r.teacher_name||r.teacher_id}</td>
          <td>${r.subject_name||r.subject_id}</td>
          <td><span class="class-badge ${r.class||''}">${CLASS_UR[r.class]||r.class||''}</span></td>
          <td>${r.target_page||''}</td>
          <td style="font-weight:700">${r.actual_page||''}</td>
          <td style="color:${diffColor};font-weight:700">${diff>0?'+':''}${diff}</td>
          <td><span class="badge ${r.complete==='ہاں'?'p':r.complete==='جزوی'?'l':'a'}">${r.complete||''}</span></td>
        </tr>`;
      });
      html += '</tbody></table></div>';
    } else {
      html += '<div style="text-align:center;padding:30px;color:#8a9ab5">آج ابھی تک کوئی رپورٹ نہیں</div>';
    }
    html += '</div>';
  }

  // ═══════════════════════════════════════════
  // TAB: EXPORT
  // ═══════════════════════════════════════════
  if (activeTab === 'export') {
    html += '<div class="section"><h2>📥 ڈیٹا ایکسپورٹ</h2>';
    html += '<div class="filter-bar">';
    html += '<input type="date" id="expFrom" value="'+TODAY+'">';
    html += '<span style="color:#8a9ab5">→</span>';
    html += '<input type="date" id="expTo" value="'+TODAY+'">';
    html += '</div>';
    const exports = [
      {id:'student_attendance',l:'📋 مضمون وار حاضری',cols:'date,teacher_name,subject_name,class,student_id,status,created_at'},
      {id:'daily_attendance',l:'🕐 یومیہ حاضری',cols:'date,slot,marked_by_name,student_id,status,created_at'},
      {id:'teacher_attendance',l:'👨‍🏫 اساتذہ حاضری',cols:'date,teacher_id,teacher_name,status,approved,approved_by,created_at'},
      {id:'daily_reports',l:'📝 رپورٹس',cols:'date,teacher_name,subject_name,class,target_page,actual_page,complete,reason,created_at'},
      {id:'thursday_tests',l:'✍️ امتحانات',cols:'date,examiner_name,subject_name,class,excellent,good,weak,fail,average,created_at'},
      {id:'hifz_progress',l:'📖 حفظ',cols:'date,student_name,paras,soorah,aayat,qari_id,created_at'},
      {id:'students',l:'👥 طلبا فہرست',cols:'id,name,parent,phone,residence,class,qari_id,status,hifz_paras'},
    ];
    html += '<div class="grid">';
    exports.forEach(e => {
      html += `<div class="card" style="cursor:pointer" onclick="exportCSV('${e.id}','${e.cols}')">
        <div style="font-size:24px;margin-bottom:6px">📥</div>
        <div style="font-weight:700;font-size:12px">${e.l}</div>
        <div style="font-size:9px;color:#8a9ab5;margin-top:4px">CSV ڈاؤنلوڈ</div>
      </div>`;
    });
    html += '</div></div>';
  }

  document.getElementById('app').innerHTML = html;
  if (activeTab === TAB_ACCOUNTABILITY) {
    if (accountabilityDraft) {
      restoreAccountabilityDraft(accountabilityDraft);
      initAccountabilityAfterDraftRestore();
    } else {
      initAdminInspectClassFromSaved();
    }
  }
  if (activeTab === 'sAttend' && sAttendUi.search.length) {
    const inp = document.getElementById('sSearch');
    if (inp) {
      inp.focus();
      const L = sAttendUi.search.length;
      try { inp.setSelectionRange(L, L); } catch (e) {}
    }
  }
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function switchTab(id) { activeTab = id; render(); }

async function refresh() {
  toast('⏳ تازہ ہو رہا ہے...');
  await loadAll();
  render();
  toast('✅ تازہ');
}

async function approveTeacher(tid) {
  const ok = await sbPatch('teacher_attendance',
    'date=eq.'+TODAY+'&teacher_id=eq.'+tid,
    {approved:true, approved_by:'admin', approved_at:new Date().toISOString()}
  );
  if (ok) { toast('✅ منظور'); await loadAll(); render(); }
  else toast('❌ ناکام');
}

async function approveAll() {
  const ok = await sbPatch('teacher_attendance',
    'date=eq.'+TODAY+'&approved=eq.false',
    {approved:true, approved_by:'admin', approved_at:new Date().toISOString()}
  );
  if (ok) { toast('✅ سب منظور'); await loadAll(); render(); }
  else toast('❌ ناکام');
}

async function markTask(taskId, taskName, currentlyDone) {
  try {
    const newState = !currentlyDone;
    const r = await fetch(SB_URL+'/rest/v1/admin_tasks?on_conflict=date,task_id', {
      method:'POST', headers:{...headers,'Prefer':'resolution=merge-duplicates'},
      body: JSON.stringify({date:TODAY, task_id:taskId, task_name:taskName, completed:newState, completed_at:newState?new Date().toISOString():null})
    });
    if (r.ok) { toast(newState?'✅ مکمل':'↩️ واپس'); await loadAll(); render(); }
    else toast('❌ ناکام');
  } catch(e) { toast('❌ '+e.message); }
}

async function exportCSV(table, colStr) {
  const from = document.getElementById('expFrom')?.value || TODAY;
  const to = document.getElementById('expTo')?.value || TODAY;
  toast('⏳ لوڈ ہو رہا ہے...');
  try {
    let params = 'select='+colStr+'&order=created_at.desc&limit=5000';
    if (table !== 'students') params += '&date=gte.'+from+'&date=lte.'+to;
    const data = await sb(table, params);
    if (!data.length) { toast('⚠️ خالی'); return; }
    const cols = colStr.split(',');
    const header = cols.join(',');
    const rows = data.map(r => cols.map(c => '"'+(String(r[c]||'')).replace(/"/g,'""')+'"').join(','));
    const csv = '\uFEFF'+header+'\n'+rows.join('\n');
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=table+'_'+from+'_to_'+to+'.csv';
    a.click(); URL.revokeObjectURL(url);
    toast('✅ ڈاؤنلوڈ — '+data.length+' سطریں');
  } catch(e) { toast('❌ '+e.message); }
}

// ═══════════════════════════════════════════
// ADMIN TAB — class inspection dropdown + preview
// ═══════════════════════════════════════════
window.updateAccClassVisitedCounter = function () {
  const ta = document.getElementById('acc_class_visited');
  const cnt = document.getElementById('acc_class_visited_cnt');
  if (!ta || !cnt) return;
  const n = (ta.value || '').length;
  cnt.textContent = n + '/3' + (n >= 3 ? ' \u2713' : '');
};

window.initAdminInspectClassFromSaved = function () {
  const ta = document.getElementById('acc_class_visited');
  if (!ta) return;
  const v = (DATA.adminReport && typeof DATA.adminReport.class_visited === 'string' && DATA.adminReport.class_visited) || '';
  ta.value = v;
  window.updateAccClassVisitedCounter();
  const sel = document.getElementById('acc_inspect_class_sel');
  const m = v.match(/^\[([a-zA-Z0-9_]+)\]/);
  if (sel && m) sel.value = m[1];
  const obs = document.getElementById('acc_class_obs');
  if (obs) obs.value = (DATA.adminReport && typeof DATA.adminReport.class_observations === 'string' && DATA.adminReport.class_observations) || '';
  window.refreshVisitsListUI && window.refreshVisitsListUI();
  window.onInspectClassChange({ preserveTextarea: !!(v && v.trim()) });
};

window.refreshVisitsListUI = function () {
  const el = document.getElementById('acc_visits_list');
  const store = document.getElementById('acc_class_obs');
  const hint = document.getElementById('acc_class_obs_score_hint');
  if (!store) return;
  const visits = parseVisitObservations(store.value);
  if (el) el.innerHTML = formatVisitObsCardsHtml(visits);
  const tot = visits.reduce((a, v) => a + ((v.text || '').trim().length), 0);
  if (hint) {
    hint.textContent = visits.length
      ? tot + ' حرف' + (classObsScoringOk(store.value) ? ' \u2713' : ' (10+ کل)')
      : '';
  }
};

window.saveClassVisitObservation = function () {
  const sel = document.getElementById('acc_inspect_class_sel');
  const obsInp = document.getElementById('acc_visit_obs_input');
  const store = document.getElementById('acc_class_obs');
  if (!sel || !obsInp || !store) return;
  const classId = sel.value;
  const text = (obsInp.value || '').trim();
  if (!classId) { toast('\u26A0 \u067E\u06C1\u0644\u06D2 \u062F\u0631\u062C\u06C1 \u0645\u0646\u062A\u062E\u0628 \u06A9\u0631\u06CC\u06BA'); return; }
  if (text.length < 5) { toast('\u26A0 \u06A9\u0645 \u0627\u0632 \u06A9\u0645 5 \u062D\u0631\u0648\u0641'); return; }
  let visits = parseVisitObservations(store.value);
  if (visits.some(v => v.legacy)) visits = [];
  const idx = visits.findIndex(v => v.classId === classId);
  const entry = { classId, text };
  if (idx >= 0) visits[idx] = entry; else visits.push(entry);
  store.value = serializeVisitObservations(visits);
  toast('\u2713 \u0645\u062D\u0641\u0648\u0638');
  window.refreshVisitsListUI();
};

window.editClassVisitObs = function (classId) {
  const sel = document.getElementById('acc_inspect_class_sel');
  if (!sel) return;
  if (!classId) {
    const obsInp = document.getElementById('acc_visit_obs_input');
    const store = document.getElementById('acc_class_obs');
    if (obsInp && store) obsInp.value = (store.value || '').trim();
    sel.value = '';
    toast('\u067E\u0631\u0627\u0646\u0627 \u0645\u062A\u0646: \u062F\u0631\u062C\u06C1 \u0645\u0646\u062A\u062E\u0628 \u06A9\u0631 \u06A9\u06D2 \u0645\u062D\u0641\u0648\u0638 \u06A9\u0631\u06CC\u06BA');
    return;
  }
  sel.value = classId;
  window.onInspectClassChange({ preserveTextarea: true });
};

window.removeClassVisitObs = function (classId) {
  const store = document.getElementById('acc_class_obs');
  if (!store) return;
  if (!classId) store.value = '';
  else {
    let visits = parseVisitObservations(store.value).filter(v => v.classId !== classId);
    visits = visits.filter(v => !v.legacy);
    store.value = serializeVisitObservations(visits);
  }
  window.refreshVisitsListUI();
  toast('\u062D\u0630\u0641');
};

window.onInspectClassChange = async function (opts) {
  const preserveTa = opts && opts.preserveTextarea;
  const sel = document.getElementById('acc_inspect_class_sel');
  const ta = document.getElementById('acc_class_visited');
  const prev = document.getElementById('acc_inspect_preview');
  if (!sel || !ta || !prev) return;
  const classId = sel.value;
  if (!classId) {
    prev.innerHTML = '<span style="color:#8a9ab5">\u062F\u0631\u062C\u06C1 \u0645\u0646\u062A\u062E\u0628 \u06A9\u0631\u06CC\u06BA \u2014 \u0645\u0648\u062C\u0648\u062F\u06C1 \u0648\u0642\u062A \u06A9\u06D2 \u067E\u06CC\u0631\u06CC\u0688\u060C \u0645\u0636\u0645\u0648\u0646\u060C \u0622\u062C \u06A9\u0627 \u06C1\u062F\u0641/\u0627\u0635\u0644\u060C \u0627\u0648\u0631 \u06AF\u0632\u0634\u062A\u06C1 \u0631\u067E\u0648\u0631\u0679 \u06CC\u06C1\u0627\u06BA \u0622\u0626\u06D2 \u06AF\u06CC</span>';
    if (!preserveTa) ta.value = '';
    const oi = document.getElementById('acc_visit_obs_input');
    if (oi) oi.value = '';
    window.updateAccClassVisitedCounter();
    return;
  }
  const { periods, assignments, subjects, teachers, reportsToday } = DATA;
  const slot = resolveClassInspectionSlot(periods, assignments, subjects, classId);
  const textLines = [];
  const linesHtml = [];
  textLines.push('[' + classId + '] ' + (CLASS_UR[classId] || classId));
  linesHtml.push('<div style="font-weight:800;color:var(--gd)">' + escHtml(CLASS_UR[classId] || classId) + '</div>');
  if (!slot) {
    const msg = '\u0627\u0633 \u062F\u0631\u062C\u06D2 \u06A9\u06D2 \u0644\u06CC\u06D2 \u0622\u062C \u06A9\u06CC \u062A\u0641\u0648\u06CC\u0636 \u0646\u06C1\u06CC\u06BA \u0645\u0644\u06CC';
    textLines.push(msg);
    linesHtml.push('<div style="margin-top:6px;color:#fdba74">' + escHtml(msg) + '</div>');
    prev.innerHTML = linesHtml.join('');
    if (!preserveTa || !(ta.value || '').trim()) ta.value = textLines.join('\n');
    window.updateAccClassVisitedCounter();
    const obsInp0 = document.getElementById('acc_visit_obs_input');
    const store0 = document.getElementById('acc_class_obs');
    if (obsInp0 && store0) {
      const vs0 = parseVisitObservations(store0.value).filter(v => !v.legacy);
      const ex0 = vs0.find(x => x.classId === classId);
      obsInp0.value = ex0 ? ex0.text : '';
    }
    return;
  }
  const { period, assignment: asg, when } = slot;
  const sub = subjects.find(s => s.id === asg.subject_id);
  const tm = teachers.find(t => t.id === asg.teacher_id);
  const head = when === 'current' ? '\u0645\u0648\u062C\u0648\u062F\u06C1 \u0648\u0642\u062A \u2014 \u067E\u06CC\u0631\u06CC\u0688 ' + period.id : '\u062C\u062F\u0648\u0644 \u2014 \u067E\u06CC\u0631\u06CC\u0688 ' + period.id;
  const line2 = head + ' (' + period.start_time + '\u2013' + period.end_time + '): ' + (sub ? sub.name : asg.subject_id) + ' \u2014 \u0627\u0633\u062A\u0627\u0630: ' + (tm ? tm.name : asg.teacher_id);
  textLines.push(line2);
  linesHtml.push('<div style="font-weight:800;color:var(--gd);margin-top:6px">' + escHtml(head) + '</div>');
  linesHtml.push('<div>' + escHtml((sub ? sub.name : asg.subject_id) + ' \u2014 ' + (tm ? tm.name : asg.teacher_id)) + '</div>');
  linesHtml.push('<div style="font-size:10px;color:#8a9ab5">' + escHtml(period.start_time + '\u2013' + period.end_time) + '</div>');
  const todayR = (reportsToday || []).find(r => r.teacher_id === asg.teacher_id && r.subject_id === asg.subject_id);
  const tp = todayR && todayR.target_page != null ? todayR.target_page : '\u2014';
  const ap = todayR && todayR.actual_page != null ? todayR.actual_page : '\u2014';
  const todayTxt = '\u0622\u062C: \u06C1\u062F\u0641 \u0635\u0641\u062D\u06C1 ' + tp + ' \u00B7 \u0627\u0635\u0644 ' + ap + (todayR && todayR.complete ? ' \u00B7 ' + todayR.complete : '');
  textLines.push(todayTxt);
  linesHtml.push('<div style="margin-top:8px;padding-top:8px;border-top:1px solid #1f3d5e"><strong>\u0622\u062C</strong>: \u06C1\u062F\u0641 \u0635\u0641\u062D\u06C1 <strong>' + escHtml(String(tp)) + '</strong> \u00B7 \u0627\u0635\u0644 <strong>' + escHtml(String(ap)) + '</strong>' + (todayR && todayR.complete ? ' \u00B7 ' + escHtml(String(todayR.complete)) : '') + '</div>');
  window._inspectClassSeq = (window._inspectClassSeq | 0) + 1;
  const inspectRun = window._inspectClassSeq;
  const taSnapshot = ta.value;
  let lastTxt = '';
  try {
    const lr = await sb('daily_reports', 'teacher_id=eq.' + encodeURIComponent(asg.teacher_id) + '&subject_id=eq.' + encodeURIComponent(asg.subject_id) + '&date=lt.' + TODAY + '&select=date,target_page,actual_page,complete&order=date.desc&limit=1');
    if (lr && lr[0]) {
      lastTxt = '\u06AF\u0632\u0634\u062A\u06C1 \u0631\u067E\u0648\u0631\u0679 (' + lr[0].date + '): \u06C1\u062F\u0641 ' + (lr[0].target_page != null ? lr[0].target_page : '\u2014') + ' \u00B7 \u0627\u0635\u0644 ' + (lr[0].actual_page != null ? lr[0].actual_page : '\u2014');
      linesHtml.push('<div style="margin-top:8px;padding-top:8px;border-top:1px solid #1f3d5e"><strong>\u06AF\u0632\u0634\u062A\u06C1</strong> (' + escHtml(String(lr[0].date)) + '): \u06C1\u062F\u0641 ' + escHtml(String(lr[0].target_page != null ? lr[0].target_page : '\u2014')) + ' \u00B7 \u0627\u0635\u0644 ' + escHtml(String(lr[0].actual_page != null ? lr[0].actual_page : '\u2014')) + '</div>');
    } else {
      lastTxt = '\u06AF\u0632\u0634\u062A\u06C1 \u0631\u067E\u0648\u0631\u0679: \u06A9\u0648\u0626\u06CC \u067E\u0631\u0627\u0646\u06CC \u0627\u0646\u062F\u0631\u0627\u062C \u0646\u06C1\u06CC\u06BA';
      linesHtml.push('<div style="margin-top:8px;font-size:10px;color:#8a9ab5">' + escHtml(lastTxt) + '</div>');
    }
  } catch (e) {
    lastTxt = '\u06AF\u0632\u0634\u062A\u06C1 \u0631\u067E\u0648\u0631\u0679: \u0644\u0648\u0688 \u0646\u0627\u06A9\u0627\u0645';
    linesHtml.push('<div style="margin-top:8px;color:#f97316">' + escHtml(lastTxt) + '</div>');
  }
  textLines.push(lastTxt);
  if (inspectRun !== window._inspectClassSeq) return;
  if (sel.value !== classId) return;
  prev.innerHTML = linesHtml.join('');
  if (!preserveTa) {
    if (ta.value === taSnapshot) ta.value = textLines.join('\n');
  } else if (!(ta.value || '').trim()) {
    ta.value = textLines.join('\n');
  }
  window.updateAccClassVisitedCounter();
  const obsInp = document.getElementById('acc_visit_obs_input');
  const store = document.getElementById('acc_class_obs');
  if (obsInp && store) {
    if (classId) {
      const vs = parseVisitObservations(store.value).filter(v => !v.legacy);
      const ex = vs.find(x => x.classId === classId);
      obsInp.value = ex ? ex.text : '';
    } else {
      obsInp.value = '';
    }
  }
};

// ═══════════════════════════════════════════
// SUBMIT ACCOUNTABILITY REPORT
// ═══════════════════════════════════════════
async function submitAccountability() {
  try {
    const g = id => document.getElementById(id);
    const v = id => (g(id)||{}).value||'';
    const ck = id => (g(id)||{}).checked||false;
    const ni = id => { const x=v(id); return x===''?null:parseInt(x); };

    const payload = {
      date: TODAY,
      absent_students_entered: ni('acc_absent'),
      behind_subjects_entered: ni('acc_behind'),
      coverage_details: v('acc_coverage')||null,
      class_visited: v('acc_class_visited')||null,
      class_observations: v('acc_class_obs')||null,
      absent_actions: v('acc_absent_actions')||null,
      syllabus_notes: v('acc_syllabus')||null,
      hifz_notes: v('acc_hifz')||null,
      general_remarks: v('acc_remarks')||null,
      called_parents: ck('acc_chk_parents'),
      checked_hifz: ck('acc_chk_hifz'),
      reviewed_thursday: ck('acc_chk_thu'),
      submitted_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    };

    const r = await fetch(SB_URL+'/rest/v1/admin_accountability?on_conflict=date', {
      method:'POST', headers:{...headers,'Prefer':'resolution=merge-duplicates'},
      body: JSON.stringify(payload)
    });
    if (r.ok) { toast('✅ رپورٹ جمع — جزاک اللہ'); await loadAll(); render(); }
    else { const e = await r.text(); toast('❌ ناکام: '+e); }
  } catch(e) { toast('❌ '+e.message); }
}
