<!DOCTYPE html>
<html dir="rtl" lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c1a2e">
<title>ڈیش بورڈ — ادارہ تحقیقات اسلامی</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --dk:#0c1a2e;--dk2:#132640;--dk3:#1a3350;
  --gd:#d4a017;--gd2:#f4c430;
  --gr:#34a853;--rd:#ea4335;--yl:#fbbc04;--bl:#4285f4;
  --wh:#fff;--lg:#f4f6f8;
}
body{font-family:'Noto Sans Arabic',sans-serif;background:var(--dk);color:var(--wh);min-height:100vh;direction:rtl;
  -webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
.container{max-width:1200px;margin:0 auto;padding:10px}
.header{background:linear-gradient(135deg,var(--dk2),var(--dk3));border-radius:16px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:18px;color:var(--gd);font-weight:800}
.header .sub{font-size:10px;color:#8a9ab5}
.header .live{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--gr)}
.header .live .dot{width:8px;height:8px;border-radius:50%;background:var(--gr);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Tabs — horizontal scroll on mobile */
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;
  -webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 16px;border-radius:20px;border:none;font-family:inherit;font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;transition:.2s;flex-shrink:0;scroll-snap-align:start;
  min-height:44px;display:flex;align-items:center}
.tab.active{background:var(--gd);color:var(--dk)}
.tab:not(.active){background:var(--dk3);color:#8a9ab5}
.tab:hover:not(.active){background:#1f3d5e}

/* Grid — 2 cols on mobile, 4 on desktop */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.card{background:var(--dk2);border-radius:14px;padding:14px;border:1px solid #1f3d5e}
.card .num{font-size:24px;font-weight:800;color:var(--gd)}
.card .lbl{font-size:9px;color:#8a9ab5;margin-top:3px}
.card.gr .num{color:var(--gr)}.card.rd .num{color:var(--rd)}.card.yl .num{color:var(--yl)}.card.bl .num{color:var(--bl)}

.section{background:var(--dk2);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid #1f3d5e}
.section h2{font-size:14px;font-weight:800;color:var(--gd);margin-bottom:10px;display:flex;align-items:center;gap:8px}

/* Tables — horizontal scroll */
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:var(--dk3);color:var(--gd);padding:10px 6px;text-align:center;font-weight:700;position:sticky;top:0;white-space:nowrap}
.tbl td{padding:8px 6px;text-align:center;border-bottom:1px solid #1a3350;white-space:nowrap}
.tbl tr:hover td{background:#1a3350}
.scroll-table{max-height:400px;overflow:auto;-webkit-overflow-scrolling:touch;border-radius:10px}

.badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:10px;font-weight:700}
.badge.p{background:#34a85322;color:var(--gr)}.badge.a{background:#ea433522;color:var(--rd)}
.badge.l{background:#fbbc0422;color:var(--yl)}.badge.late{background:#ff980022;color:#ff9800}
.badge.approved{background:#34a85322;color:var(--gr)}.badge.pending{background:#ff980022;color:#ff9800}

/* Buttons — min 44px touch target */
.btn{padding:10px 18px;border-radius:12px;border:none;font-family:inherit;font-size:12px;font-weight:700;
  cursor:pointer;transition:.2s;min-height:44px;display:inline-flex;align-items:center;justify-content:center}
.btn-gd{background:var(--gd);color:var(--dk)}.btn-gd:hover{background:var(--gd2)}
.btn-gr{background:var(--gr);color:#fff}.btn-rd{background:var(--rd);color:#fff}
.btn-bl{background:var(--bl);color:#fff}
.btn-sm{padding:6px 12px;font-size:10px;min-height:36px}

/* Call button — prominent on mobile */
.call-btn{background:var(--gr);color:#fff;border:none;padding:8px 14px;border-radius:10px;
  font-family:inherit;font-size:11px;cursor:pointer;text-decoration:none;
  display:inline-flex;align-items:center;gap:4px;min-height:36px}

.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.filter-bar select,.filter-bar input{background:var(--dk3);border:1px solid #1f3d5e;color:var(--wh);
  padding:8px 10px;border-radius:10px;font-family:inherit;font-size:11px;min-height:40px}
.filter-bar input[type=date]{direction:ltr;text-align:center}
.search{background:var(--dk3);border:1px solid #1f3d5e;color:var(--wh);padding:10px 14px;border-radius:12px;
  font-family:inherit;font-size:12px;width:100%;margin-bottom:10px;min-height:44px}

.current-period{background:linear-gradient(135deg,#1a5276,#1a2780);border-radius:14px;padding:14px;margin-bottom:12px;border:2px solid var(--gd)}
.current-period h2{color:var(--gd);font-size:14px;margin-bottom:10px}
.period-card{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--dk);border-radius:10px;margin-bottom:6px;min-height:48px}
.period-card .teacher{font-weight:700;font-size:12px}.period-card .subject{font-size:10px;color:#8a9ab5}
.class-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:9px;font-weight:700}
.oola{background:#fdebd033;color:#f39c12}.sania{background:#d6eaf833;color:#3498db}
.salisa{background:#e8daef33;color:#9b59b6}.rabia{background:#d1f2eb33;color:#1abc9c}
.khamisa{background:#fcf3cf33;color:#f1c40f}.fazilat{background:#fadbd833;color:#e74c3c}
.hifz{background:#eaecee33;color:#95a5a6}

/* Task items — big touch targets */
.task-item{background:var(--dk);border:1px solid #1f3d5e;border-radius:14px;padding:14px;margin-bottom:8px;
  display:flex;align-items:flex-start;gap:12px;min-height:60px;transition:.2s}
.task-item:active{transform:scale(0.98)}
.task-icon{font-size:24px;flex-shrink:0;width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;cursor:pointer}
.task-done{background:#34a85315;border-color:#34a85344}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--gd);color:var(--dk);
  padding:12px 28px;border-radius:14px;font-weight:700;font-size:13px;z-index:999;display:none;
  box-shadow:0 4px 20px rgba(0,0,0,.4)}
.loading{text-align:center;padding:40px;color:#8a9ab5;font-size:13px}

/* Desktop */
@media(min-width:768px){
  .grid{grid-template-columns:repeat(4,1fr)}
  .header h1{font-size:22px}
  .card .num{font-size:28px}
  .container{padding:16px}
}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading">⏳ لوڈ ہو رہا ہے...</div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const SB_URL = 'https://mhhifytmrlyksfrjacvi.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oaGlmeXRtcmx5a3NmcmphY3ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTExNTAsImV4cCI6MjA4OTc2NzE1MH0.RIkSQq1Q7qLO_tVqklGV_KZabcKYfqqBFd7SLKpBE_Y';
const PRINCIPAL_PHONE = '';  // Set principal phone number here
const CLASS_UR = {oola:'اولیٰ',sania:'ثانیہ',salisa:'ثالثہ',rabia:'رابعہ',khamisa:'خامسہ',fazilat:'فضیلت',hifz:'حفظ'};
/** Grade order for معائنہ cards (matches درجہ dropdown — not save-time order). */
const CLASS_ORDER = Object.keys(CLASS_UR);
const exports_list = [
  {id:'student_attendance',l:'📋 مضمون وار حاضری',cols:'date,teacher_name,subject_name,class,student_id,status,created_at'},
  {id:'daily_attendance',l:'🕐 یومیہ حاضری',cols:'date,slot,marked_by_name,student_id,status,created_at'},
  {id:'teacher_attendance',l:'👨‍🏫 اساتذہ حاضری',cols:'date,teacher_id,teacher_name,status,approved,approved_by,created_at'},
  {id:'daily_reports',l:'📝 رپورٹس',cols:'date,teacher_name,subject_name,class,target_page,actual_page,complete,reason,created_at'},
  {id:'thursday_tests',l:'✍️ امتحانات',cols:'date,examiner_name,subject_name,class,excellent,good,weak,fail,average,created_at'},
  {id:'hifz_progress',l:'📖 حفظ',cols:'date,student_name,paras,soorah,aayat,qari_id,created_at'},
  {id:'students',l:'👥 طلبا فہرست',cols:'id,name,parent,phone,residence,class,qari_id,status,hifz_paras'},
];
const TODAY = new Date().toISOString().split('T')[0];

// ═══════════════════════════════════════════
// SUPABASE HELPERS
// ═══════════════════════════════════════════
const headers = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
async function sb(table, params='') {
  const r = await fetch(SB_URL+'/rest/v1/'+table+'?'+params, {headers:{'apikey':SB_KEY}});
  if (!r.ok) throw new Error(r.status+' '+r.statusText);
  return r.json();
}
async function sbPatch(table, filter, data) {
  const r = await fetch(SB_URL+'/rest/v1/'+table+'?'+filter, {
    method:'PATCH', headers:{...headers,'Prefer':'return=minimal'}, body:JSON.stringify(data)
  });
  return r.ok;
}
function toast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}
function now() {
  const d=new Date();
  return d.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'});
}
function todayIST() {
  return new Date().toLocaleDateString('ur-PK',{weekday:'long',year:'numeric',month:'long',day:'numeric',timeZone:'Asia/Kolkata'});
}

// ═══════════════════════════════════════════
// LOAD ALL DATA
// ═══════════════════════════════════════════
let DATA = {};
async function loadAll() {
  try {
    const [teachers,subjects,students,periods,assignments,
           tAttToday,sAttToday,dAttToday,reportsToday] = await Promise.all([
      sb('teachers','select=*&order=id'),
      sb('subjects','select=*&order=id'),
      sb('students','select=*&order=name'),
      sb('periods','select=*&order=id'),
      sb('assignments','select=*&order=period_id'),
      sb('teacher_attendance','select=*&date=eq.'+TODAY),
      sb('student_attendance','select=*&date=eq.'+TODAY+'&order=created_at.desc&limit=500'),
      sb('daily_attendance','select=*&date=eq.'+TODAY+'&order=created_at.desc&limit=500'),
      sb('daily_reports','select=*&date=eq.'+TODAY),
    ]);
    // These may fail if tables are new/empty — load separately
    let leaveSummary=[],adminTasks=[],adminScores=[],adminReport=null;
    try { leaveSummary = await sb('teacher_leave_summary','select=*'); } catch(e) { console.warn('leave_summary:',e); }
    try { adminTasks = await sb('admin_tasks','select=*&date=eq.'+TODAY); } catch(e) { console.warn('admin_tasks:',e); }
    try { adminScores = await sb('admin_daily_score','select=*&limit=14&order=date.desc'); } catch(e) { console.warn('admin_scores:',e); }
    try { const ar = await sb('admin_accountability','select=*&date=eq.'+TODAY); adminReport = ar.length?ar[0]:null; } catch(e) { console.warn('admin_report:',e); }
    DATA = {teachers,subjects,students,periods,assignments,tAttToday,sAttToday,dAttToday,reportsToday,leaveSummary,adminTasks,adminScores,adminReport};
    return DATA;
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="loading">❌ Supabase سے رابطہ ناکام<br><small>'+e.message+'</small></div>';
    throw e;
  }
}

// ═══════════════════════════════════════════
// CURRENT PERIOD CALCULATION
// ═══════════════════════════════════════════
function getCurrentPeriod(periods) {
  const t = now();
  for (const p of periods) {
    if (p.type === 'break') continue;
    // Convert times like "10:00" to comparable format
    const s = p.start_time.padStart(5,'0');
    const e = p.end_time.padStart(5,'0');
    if (t >= s && t < e) return p;
  }
  return null;
}

function escHtml(t) {
  return String(t == null ? '' : t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function subjectClassId(sub) {
  return (sub && (sub.class || sub.class_id || '')) || '';
}

function findAssignmentForClassPeriod(assignments, subjects, classId, periodId) {
  if (periodId == null) return null;
  return (assignments || []).find(a => {
    if (Number(a.period_id) !== Number(periodId)) return false;
    const sub = subjects.find(s => s.id === a.subject_id);
    return sub && subjectClassId(sub) === classId;
  }) || null;
}

/** First timetable slot (by period id) that has an assignment for this class */
function firstAssignmentForClass(assignments, subjects, periods, classId) {
  const teaching = (periods || []).filter(p => p.type !== 'break').sort((a, b) => Number(a.id) - Number(b.id));
  for (const p of teaching) {
    const asg = findAssignmentForClassPeriod(assignments, subjects, classId, p.id);
    if (asg) return { period: p, assignment: asg };
  }
  return null;
}

/** Prefer current period’s lesson for this class; else first slot of the day for that class */
function resolveClassInspectionSlot(periods, assignments, subjects, classId) {
  const cur = getCurrentPeriod(periods || []);
  if (cur) {
    const asg = findAssignmentForClassPeriod(assignments, subjects, classId, cur.id);
    if (asg) return { period: cur, assignment: asg, when: 'current' };
  }
  const fb = firstAssignmentForClass(assignments, subjects, periods, classId);
  if (fb) return { ...fb, when: 'scheduled' };
  return null;
}

const VISIT_OBS_TAG = '[[VISIT_OBS class=';
const VISIT_OBS_CLOSE = '[[/VISIT_OBS]]';
/** Saved inside each VISIT_OBS block — English keys only (UI labels stay Urdu/ bilingual). */
const VISIT_QA_REQUIRED = 3;
/** Principal may log up to this many separate حفظ memory checks (قاری سے) per day. */
const HIFZ_MEMORY_SLOTS = 4;

function tryParseVisitJsonPayload(inner) {
  const t = (typeof inner === 'string' ? inner : '').trim();
  if (!t.startsWith('{')) return null;
  try {
    const o = JSON.parse(t);
    if (!o || !Array.isArray(o.qa)) return null;
    const narrative = typeof o.narrative === 'string' ? o.narrative : '';
    return { qa: o.qa, narrative };
  } catch (e) {
    return null;
  }
}

function parseVisitObservations(raw) {
  const s = typeof raw === 'string' ? raw : '';
  if (!s.trim()) return [];
  if (s.indexOf(VISIT_OBS_TAG) === -1) return [{ classId: '', text: s.trim(), legacy: true }];
  const out = [];
  const re = /\[\[VISIT_OBS class=([a-zA-Z0-9_]+)\]\]([\s\S]*?)\[\[\/VISIT_OBS\]\]/g;
  let m;
  while ((m = re.exec(s))) {
    const inner = (m[2] || '').trim();
    const parsed = tryParseVisitJsonPayload(inner);
    if (parsed) out.push({ classId: m[1], structured: true, qa: parsed.qa, narrative: parsed.narrative });
    else out.push({ classId: m[1], text: inner, structured: false });
  }
  return out;
}

/** Legacy blob first; then each grade in CLASS_ORDER; unknown ids last. */
function sortVisitObservationsForDisplay(visits) {
  if (!visits || !visits.length) return [];
  const legacy = visits.filter(v => v.legacy);
  const rest = visits.filter(v => !v.legacy);
  const rank = new Map(CLASS_ORDER.map((id, i) => [id, i]));
  rest.sort((a, b) => {
    const ar = rank.has(a.classId) ? rank.get(a.classId) : 999;
    const br = rank.has(b.classId) ? rank.get(b.classId) : 999;
    if (ar !== br) return ar - br;
    return String(a.classId).localeCompare(String(b.classId));
  });
  return legacy.concat(rest);
}

function serializeVisitObservations(arr) {
  const sorted = sortVisitObservationsForDisplay(arr || []);
  return sorted
    .filter(v => {
      if (!v || !v.classId) return false;
      if (v.structured) return visitHasThreeValidQa(v.qa);
      return (v.text || '').trim().length > 0;
    })
    .map(v => {
      const inner = v.structured
        ? JSON.stringify({ qa: v.qa, narrative: (v.narrative || '').trim() })
        : (v.text || '').trim();
      return VISIT_OBS_TAG + v.classId + ']]\n' + inner + '\n' + VISIT_OBS_CLOSE;
    })
    .join('\n\n');
}

function visitQaRowValid(q) {
  if (!q || typeof q !== 'object') return false;
  const wt = String(q.whoType || '').trim();
  if (wt !== 'teacher' && wt !== 'student') return false;
  const wid = String(q.whoId || '').trim();
  if (!wid) return false;
  if (String(q.question || '').trim().length < 2) return false;
  if (String(q.answer || '').trim().length < 2) return false;
  return true;
}

function visitHasThreeValidQa(qa) {
  if (!Array.isArray(qa) || qa.length < VISIT_QA_REQUIRED) return false;
  for (let i = 0; i < VISIT_QA_REQUIRED; i++) if (!visitQaRowValid(qa[i])) return false;
  return true;
}

function visitBlockScoresOk(v) {
  if (!v) return false;
  if (v.legacy) return String(v.text || '').trim().length >= 10;
  if (v.structured) return visitHasThreeValidQa(v.qa);
  return String(v.text || '').trim().length >= 15;
}

function classObsScoringOk(raw) {
  const s = (raw || '').trim();
  if (!s) return false;
  if (s.indexOf(VISIT_OBS_TAG) === -1) return s.length >= 10;
  const visits = parseVisitObservations(raw);
  if (!visits.length) return false;
  return visits.every(visitBlockScoresOk);
}

function formatVisitStructuredCardInner(v) {
  const rows = (v.qa || []).slice(0, VISIT_QA_REQUIRED).map((q, idx) => {
    const whoUr = q.whoType === 'teacher' ? '\u0627\u0633\u062A\u0627\u0630' : '\u0637\u0627\u0644\u0628 \u0639\u0644\u0645';
    const whoEn = q.whoType === 'teacher' ? 'Teacher' : 'Student';
    const nm = escHtml(q.whoLabel || q.whoId || '\u2014');
    return `<tr>
      <td style="font-weight:700">${idx + 1}</td>
      <td>${escHtml(whoUr)}<br><span style="font-size:9px;color:#8a9ab5">${whoEn}</span></td>
      <td style="text-align:right;max-width:100px;white-space:normal;word-break:break-word">${nm}</td>
      <td style="text-align:right;max-width:140px;white-space:normal;word-break:break-word">${escHtml(q.question || '')}</td>
      <td style="text-align:right;max-width:140px;white-space:normal;word-break:break-word">${escHtml(q.answer || '')}</td>
    </tr>`;
  }).join('');
  const nar = (v.narrative || '').trim();
  const narBlock = nar
    ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid #1f3d5e"><span style="font-size:9px;color:#8a9ab5">\u0636\u0645\u06CC\u0645\u06CC \u0646\u0648\u0679 / narrative</span><div style="font-size:11px;white-space:pre-wrap;color:#c5cee0;margin-top:4px">${escHtml(nar)}</div></div>`
    : '';
  return `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
    <table class="tbl" style="font-size:10px;white-space:normal">
      <thead><tr>
        <th>#</th>
        <th>\u06A9\u0633 \u0633\u06D2 / To</th>
        <th>\u0646\u0627\u0645 / Name</th>
        <th>\u0633\u0648\u0627\u0644 / Question</th>
        <th>\u062C\u0648\u0627\u0628 / Answer</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>${narBlock}`;
}

function formatVisitObsCardBody(v, omitGradeBadge) {
  const title = v.legacy ? 'پرانا نوٹ' : (CLASS_UR[v.classId] || v.classId);
  const bid = v.legacy ? '' : v.classId;
  const delArg = v.legacy ? "''" : "'" + bid + "'";
  const edCall = v.legacy ? "''" : "'" + bid + "'";
  const head = omitGradeBadge && !v.legacy
    ? `<div style="display:flex;justify-content:flex-end;align-items:center;gap:4px;margin-bottom:6px">
        <button type="button" class="btn btn-sm" style="font-size:9px;padding:4px 8px;min-height:32px" onclick="window.editClassVisitObs(${edCall})">\u062A\u062F\u0648\u06CC\u0646</button>
        <button type="button" class="btn btn-rd btn-sm" style="font-size:9px;padding:4px 8px;min-height:32px" onclick="window.removeClassVisitObs(${delArg})">\u062D\u0630\u0641</button>
      </div>`
    : `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px">
        <span class="class-badge ${bid}">${escHtml(title)}</span>
        <span style="display:flex;gap:4px;flex-shrink:0">

/** One row per grade in CLASS_ORDER: note under its درجہ heading (not random save order). */
function formatVisitObsCardsHtml(visits) {
  const sorted = sortVisitObservationsForDisplay(visits.slice());
  const legacy = sorted.filter(v => v.legacy);
  const byGrade = new Map(sorted.filter(v => !v.legacy).map(v => [v.classId, v]));

  const extras = sorted.filter(v => !v.legacy && !known.has(v.classId));

  if (!legacy.length && !byGrade.size && !extras.length) {
    return '<span style="color:#8a9ab5;font-size:11px">\u0627\u0628\u06BE\u06CC \u06A9\u0648\u0626\u06CC \u062F\u0631\u062C\u06D2 \u0648\u0627\u0631 \u0645\u0639\u0627\u0626\u0646\u06C1 \u0646\u06C1\u06CC\u06BA \u2014 \u062F\u0631\u062C\u06C1 \u0645\u0646\u062A\u062E\u0628 \u06A9\u0631\u06CC\u06BA\u060C \u06AF\u0631\u062F \u0645\u06CC\u06BA 3 \u0633\u0648\u0627\u0644-\u062C\u0648\u0627\u0628 \u0628\u06BE\u0631\u06CC\u06BA\u060C \u0645\u062D\u0641\u0648\u0638 \u06A9\u0631\u06CC\u06BA</span>';

  });

  for (const cid of CLASS_ORDER) {
    const v = byGrade.get(cid);

    blocks.push(`<div style="margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #243652">
      <div style="font-weight:800;font-size:12px;color:var(--gd);margin-bottom:8px;display:flex;align-items:center;gap:8px"><span class="class-badge ${cid}">${escHtml(name)}</span></div>
      ${formatVisitObsCardBody(v, true)}

  return blocks.join('');
}

/** Teachers with an assignment today who have not submitted a daily_report for that subject; skips absent/leave. */
function pendingDailyReports(assignments, reportsToday, tAttToday, teachers, subjects) {
  const submitted = new Set((reportsToday || []).map(r => (r.teacher_id || '') + '|' + (r.subject_id || '')));
  const skipT = new Set();
  (tAttToday || []).forEach(r => {
    if (r && (r.status === 'absent' || r.status === 'leave')) skipT.add(r.teacher_id);
  });
  const miss = [];
  const seen = new Set();
  for (const a of assignments || []) {
    const tid = a.teacher_id;
    const sid = a.subject_id;
    if (!tid || !sid) continue;
    if (skipT.has(tid)) continue;
    const k = tid + '|' + sid;
    if (submitted.has(k)) continue;
    if (seen.has(k)) continue;
    seen.add(k);
    const te = teachers.find(x => x.id === tid);
    const su = subjects.find(x => x.id === sid);
    if (!su) continue;
    miss.push({ k, tname: te ? te.name : tid, subn: su.name || sid, cls: su.class, p: a.period_id });
  }
  miss.sort((x, y) => (x.tname + x.subn).localeCompare(y.tname + y.subn, 'ur'));
  return miss;
}

/** Submitted today but actual pages still below target (same rows as `daily_reports` for TODAY). */
function reportsBehindSyllabusTarget(reportsToday) {
  return (reportsToday || [])
    .map(r => {
      const tp = r.target_page != null && String(r.target_page).trim() !== '' ? Number(r.target_page) : NaN;
      const ap = r.actual_page != null && String(r.actual_page).trim() !== '' ? Number(r.actual_page) : NaN;
      if (Number.isNaN(tp) || Number.isNaN(ap) || ap >= tp) return null;
      return { r, diff: ap - tp };
    })
    .filter(Boolean)
    .sort((a, b) => a.diff - b.diff)
    .map(x => x.r);
}

  for (const r of sAttToday || []) {

    if (seen.has(r.student_id)) continue;
    seen.add(r.student_id);
    const st = (students || []).find(s => s.id === r.student_id);
    const cls = st && st.class != null && String(st.class).trim() !== '' ? String(st.class).trim() : (r.class != null ? String(r.class).trim() : '');
    out.push({ student_id: r.student_id, name: st ? (st.name || r.student_id) : r.student_id, class: cls });
  }
  return out;
}

function tryParseAbsentActionsJson(raw) {
  const s = typeof raw === 'string' ? raw.trim() : '';
  if (!s.startsWith('{')) return null;
  try {
    const o = JSON.parse(s);
    if (!o || o.v !== 1 || !Array.isArray(o.rows)) return null;
    return o;
  } catch (e) {
    return null;
  }
}

function absentActionRowValid(row, path) {
  if (!row || !path) return false;
  if (path === 'teacher_ok') {
    const tid = String(row.teacherId || '').trim();
    const ex = String(row.teacherExplanation || '').trim();
    return !!tid && ex.length >= 5;
  }
  if (path === 'principal_called') return String(row.callReply || '').trim().length >= 3;
  if (path === 'assigned_call') {
    const rep = String(row.callReply || '').trim();
    const tid = String(row.assigneeTeacherId || '').trim();
    const nm = String(row.assigneeName || '').trim();
    return rep.length >= 3 && (!!tid || nm.length >= 2);
  }
  return false;
}

function absentActionsScoringOk(raw, absentDeduped) {
  const list = absentDeduped || [];
  if (!list.length) return true;
  const parsed = tryParseAbsentActionsJson(raw);
  if (!parsed) return typeof raw === 'string' && raw.trim().length >= 10;
  const bySid = {};
  (parsed.rows || []).forEach(r => {
    if (r && r.studentId) bySid[r.studentId] = r;
  });
  for (const a of list) {
    const row = bySid[a.student_id];
    if (!row) return false;
    const path = String(row.path || '').trim();
    if (!absentActionRowValid(row, path)) return false;
  }
  return true;
}

function absentActionsHintText(raw, absentDeduped) {
  const list = absentDeduped || [];
  if (!list.length) return '\u2014 \u0622\u062C \u06A9\u0648\u0626\u06CC \u063A\u0627\u0626\u0628 \u0646\u06C1\u06CC\u06BA';
  const parsed = tryParseAbsentActionsJson(raw);
  if (!parsed) {
    const n = (typeof raw === 'string' ? raw.trim().length : 0);
    return n + '/10 \u067E\u0631\u0627\u0646\u0627 \u0645\u062A\u0646' + (n >= 10 ? ' \u2713' : '');
  }
  const bySid = {};
  (parsed.rows || []).forEach(r => {
    if (r && r.studentId) bySid[r.studentId] = r;
  });
  let ok = 0;
  for (const a of list) {
    const row = bySid[a.student_id];
    if (row && absentActionRowValid(row, String(row.path || '').trim())) ok++;
  }
  return ok + '/' + list.length + ' \u0637\u0644\u0628\u0627' + (ok === list.length ? ' \u2713' : '');
}

window.syncAbsentActionsToHidden = function () {
  const hid = document.getElementById('acc_absent_actions');
  const wrap = document.getElementById('acc_absent_actions_wrap');
  if (!hid || !wrap) return;
  const n = parseInt(wrap.getAttribute('data-abs-count') || '0', 10);
  const prevRaw = hid.value || '';
  const prevParsed = tryParseAbsentActionsJson(prevRaw);
  const fromLegacy = prevRaw.trim() && !prevParsed ? prevRaw.trim() : (prevParsed && prevParsed.fromLegacyText ? prevParsed.fromLegacyText : '');
  const rows = [];
  for (let i = 0; i < n; i++) {
    const sidEl = document.getElementById('acc_abs_sid_' + i);
    const pathEl = document.getElementById('acc_abs_path_' + i);
    const teachEl = document.getElementById('acc_abs_teacher_' + i);

    const assignEl = document.getElementById('acc_abs_assignee_' + i);
    const nameEl = document.getElementById('acc_abs_assignee_name_' + i);
    const replyEl = document.getElementById('acc_abs_reply_' + i);

    let assigneeTeacherId = assignEl ? assignEl.value.trim() : '';
    let assigneeName = nameEl ? String(nameEl.value || '').trim() : '';
    if (assigneeTeacherId === '__name_only__') assigneeTeacherId = '';
    else if (assigneeTeacherId) assigneeName = '';
    rows.push({
      studentId,
      path,
      teacherId: teachEl ? teachEl.value.trim() : '',
      teacherExplanation: explainEl ? String(explainEl.value || '').trim() : '',
      assigneeTeacherId,
      assigneeName,
      callReply: replyEl ? String(replyEl.value || '').trim() : ''
    });
  }
  const payload = { v: 1, rows };
  if (fromLegacy) payload.fromLegacyText = fromLegacy;
  hid.value = JSON.stringify(payload);
  const hint = document.getElementById('acc_absent_actions_hint');
  if (hint) {
    if (!n) hint.textContent = absentActionsHintText(hid.value, []);
    else {
      let ok = 0;
      for (const row of rows) {
        if (absentActionRowValid(row, String(row.path || '').trim())) ok++;

function tryParseHifzNotesJson(raw) {

  try {
    const o = JSON.parse(s);
    if (!o || o.v !== 1 || !Array.isArray(o.entries)) return null;
    return o;
  } catch (e) {
    return null;
  }
}

function hifzMemoryEntryValid(e) {
  if (!e) return false;
  const sid = String(e.studentId || '').trim();
  const span = String(e.memorySpan || '').trim();
  const prompt = String(e.promptAsked || '').trim();
  const resp = String(e.studentResponse || '').trim();
  const pos = String(e.progressWhere || '').trim();
  const q = String(e.recallQuality || '').trim();
  if (!sid || !span || prompt.length < 3 || resp.length < 2 || pos.length < 2 || !q) return false;
  if (span === 'other' && prompt.length < 5) return false;
  return true;
}

function hifzNotesScoringOk(raw, roster) {
  if (!roster.length) return true;
  const parsed = tryParseHifzNotesJson(raw);
  if (!parsed) return typeof raw === 'string' && raw.trim().length >= 10;
  return (parsed.entries || []).some(hifzMemoryEntryValid);
}

function hifzNotesHintText(raw, roster) {
  if (!roster.length) return '\u2014 \u062D\u0641\u0638 \u0637\u0644\u0628\u0627 \u0641\u06C1\u0631\u0633\u062A \u0645\u06CC\u06BA \u0646\u06C1\u06CC\u06BA';
  const parsed = tryParseHifzNotesJson(raw);
  if (!parsed) {
    const n = (typeof raw === 'string' ? raw.trim().length : 0);
    return n + '/10 \u067E\u0631\u0627\u0646\u0627' + (n >= 10 ? ' \u2713' : '');
  }
  let ok = 0;
  for (const e of parsed.entries || []) {
    if (hifzMemoryEntryValid(e)) ok++;
  }
  return ok + ' \u0633\u0644\u0627\u0679 \u0645\u06A9\u0645\u0644' + (ok > 0 ? ' \u2713' : '');
}

window.syncHifzNotesToHidden = function () {
  const hid = document.getElementById('acc_hifz');
  const wrap = document.getElementById('acc_hifz_wrap');
  if (!hid || !wrap) return;
  const prevRaw = hid.value || '';
  const prevParsed = tryParseHifzNotesJson(prevRaw);
  const fromLegacy = prevRaw.trim() && !prevParsed ? prevRaw.trim() : (prevParsed && prevParsed.fromLegacyText ? prevParsed.fromLegacyText : '');
  const entries = [];
  for (let i = 0; i < HIFZ_MEMORY_SLOTS; i++) {
    const sidEl = document.getElementById('acc_hf_sid_' + i);
    const spanEl = document.getElementById('acc_hf_span_' + i);
    const prEl = document.getElementById('acc_hf_prompt_' + i);
    const rsEl = document.getElementById('acc_hf_resp_' + i);
    const posEl = document.getElementById('acc_hf_pos_' + i);
    const qEl = document.getElementById('acc_hf_quality_' + i);
    const studentId = sidEl ? sidEl.value.trim() : '';
    const memorySpan = spanEl ? spanEl.value.trim() : '';
    const promptAsked = prEl ? String(prEl.value || '').trim() : '';
    const studentResponse = rsEl ? String(rsEl.value || '').trim() : '';
    const progressWhere = posEl ? String(posEl.value || '').trim() : '';
    const recallQuality = qEl ? String(qEl.value || '').trim() : '';
    let studentLabel = '';
    if (studentId && sidEl) {
      const opt = sidEl.options[sidEl.selectedIndex];
      studentLabel = opt ? String(opt.textContent || '').trim() : '';
    }
    entries.push({
      studentId,
      studentLabel,
      memorySpan,
      promptAsked,
      studentResponse,
      progressWhere,
      recallQuality
    });
  }
  const payload = { v: 1, entries };
  if (fromLegacy) payload.fromLegacyText = fromLegacy;
  hid.value = JSON.stringify(payload);
  const hint = document.getElementById('acc_hifz_actions_hint');
  if (hint) {
    const rosterLen = parseInt(wrap.getAttribute('data-hifz-roster-len') || '0', 10);
    hint.textContent = hifzNotesHintText(hid.value, rosterLen > 0 ? [{ id: '_' }] : []);
  }
  if (document.getElementById('acc_checklist_banner')) window.scheduleAccountabilityChecklistRefresh && window.scheduleAccountabilityChecklistRefresh();
};

window.initHifzNotesBlockFromStore = function () {
  const hid = document.getElementById('acc_hifz');
  const wrap = document.getElementById('acc_hifz_wrap');
  if (!hid || !wrap) return;
  const parsed = tryParseHifzNotesJson(hid.value);
  const ent = parsed && parsed.entries ? parsed.entries.slice(0, HIFZ_MEMORY_SLOTS) : [];
  const padded = ent.slice();
  while (padded.length < HIFZ_MEMORY_SLOTS) padded.push({});
  for (let i = 0; i < HIFZ_MEMORY_SLOTS; i++) {
    const r = padded[i] || {};
    const sidEl = document.getElementById('acc_hf_sid_' + i);
    if (sidEl) {
      if (r.studentId) ensureOptionInSelect(sidEl, r.studentId, r.studentLabel || r.studentId);
      sidEl.value = r.studentId || '';
    }
    const spanEl = document.getElementById('acc_hf_span_' + i);
    if (spanEl) {
      const sp = String(r.memorySpan || '').trim();
      spanEl.value = ['last_2_days', 'last_3_days', 'last_week', 'other'].includes(sp) ? sp : '';
    }
    const pr = document.getElementById('acc_hf_prompt_' + i);
    if (pr) pr.value = r.promptAsked || '';
    const rs = document.getElementById('acc_hf_resp_' + i);
    if (rs) rs.value = r.studentResponse || '';
    const pos = document.getElementById('acc_hf_pos_' + i);
    if (pos) pos.value = r.progressWhere || '';
    const q = document.getElementById('acc_hf_quality_' + i);
    if (q) {
      const rq = String(r.recallQuality || '').trim();
      q.value = ['weak', 'adequate', 'strong'].includes(rq) ? rq : '';
    }
  }
  const note = document.getElementById('acc_hifz_legacy_note');
  if (note) {
    if (!parsed && (hid.value || '').trim() && !(hid.value || '').trim().startsWith('{')) {
      note.style.display = 'block';
      const raw = (hid.value || '').trim();
      note.textContent = raw.length > 800 ? raw.slice(0, 800) + '\u2026' : raw;
    } else {
      note.style.display = 'none';
      note.textContent = '';
    }
  }
  if (parsed || !((hid.value || '').trim())) window.syncHifzNotesToHidden();
};

function captureAccountabilityDraft() {
  const ta = document.getElementById('acc_class_visited');
  if (!ta) return null;
  const valueIds = ['acc_absent','acc_behind','acc_coverage','acc_inspect_class_sel','acc_class_visited','acc_class_obs','acc_absent_actions','acc_hifz','acc_remarks','acc_visit_narrative'];

    valueIds.push('acc_qa_who_type_' + i, 'acc_qa_who_id_' + i, 'acc_qa_question_' + i, 'acc_qa_answer_' + i);
  }
  const values = {};
  valueIds.forEach(id => {

window.accountabilityProgressFromDom = function () {
  const g = id => document.getElementById(id);
  const v = id => (g(id) && 'value' in g(id) ? String(g(id).value) : '').trim();
  const ck = id => !!(g(id) && g(id).checked);
  const absentListDedup = dedupeAbsentStudentsToday(DATA.sAttToday || [], DATA.students || []);
  const hifzRoster = hifzRosterStudents(DATA.students || []);
  const absentTeachers = (DATA.tAttToday || []).filter(r => r && (r.status === 'absent' || r.status === 'leave'));
  const tAttToday = DATA.tAttToday || [];
  const isThu = new Date().getDay() === 4;

  const absentNumOk = v('acc_absent') !== '' && !Number.isNaN(parseInt(v('acc_absent'), 10));
  const behindNumOk = v('acc_behind') !== '' && !Number.isNaN(parseInt(v('acc_behind'), 10));
  const covOk = (absentTeachers.length === 0 && tAttToday.length > 0) || v('acc_coverage').length > 0;

  const visLen = v('acc_class_visited').length;
  const obsVal = (g('acc_class_obs') && g('acc_class_obs').value) ? String(g('acc_class_obs').value) : '';
  const obsOk = classObsScoringOk(obsVal);
  const classBlockOk = visLen >= 3 && obsOk;
  let classAnchor = 'acc_anchor_class_visit';
  if (visLen >= 3 && !obsOk) classAnchor = 'acc_anchor_inspection';
  else if (visLen < 3) classAnchor = 'acc_anchor_class_visit';

  const absentActVal = (g('acc_absent_actions') && g('acc_absent_actions').value) ? String(g('acc_absent_actions').value) : '';
  const absentActOk = absentActionsScoringOk(absentActVal, absentListDedup);

  const hifzVal = (g('acc_hifz') && g('acc_hifz').value) ? String(g('acc_hifz').value) : '';
  const hifzOk = hifzNotesScoringOk(hifzVal, hifzRoster);

  const remarksOk = v('acc_remarks').length >= 5;

  const sections = [
    { key: 'verify', label: '\u0642\u0627\u0628\u0644 \u062A\u0635\u062F\u06CC\u0642 \u2014 \u063A\u0627\u0626\u0628\u060C \u067E\u06CC\u0686\u06D2\u060C \u0628\u0646\u062F\u0648\u0628\u0633\u062A', labelEn: 'Verifiable (absent / behind / coverage)', done: absentNumOk && behindNumOk && covOk, anchor: 'acc_anchor_verify' },
    { key: 'class', label: '\u06A9\u0644\u0627\u0633 \u062F\u06CC\u06A9\u06BE\u0646\u0627 + \u0645\u0639\u0627\u0626\u0646\u06C1 (3\u00D7Q&A)', labelEn: 'Class visit + inspection', done: classBlockOk, anchor: classAnchor },
    { key: 'absent_act', label: '\u063A\u0627\u0626\u0628 \u0637\u0644\u0628\u0627 \u2014 \u0627\u0642\u062F\u0627\u0645', labelEn: 'Absent students follow-up', done: absentActOk, anchor: 'acc_anchor_absent_actions' },
    { key: 'hifz', label: '\u062D\u0641\u0638 \u06CC\u0627\u062F / \u0642\u0627\u0631\u06CC', labelEn: 'Hifz recall', done: hifzOk, anchor: 'acc_anchor_hifz' },
    { key: 'remarks', label: '\u0639\u0645\u0648\u0645\u06CC \u0645\u0644\u0627\u062D\u0638\u0627\u062A', labelEn: 'General remarks', done: remarksOk, anchor: 'acc_anchor_remarks' },
    { key: 'chk_parents', label: '\u0686\u06CC\u06A9: \u063A\u0627\u0626\u0628 \u0637\u0644\u0628\u0627 \u2014 \u0648\u0627\u0644\u062F\u06CC\u0646 \u0633\u06D2 \u0631\u0627\u0628\u0637\u06C1', labelEn: 'Confirm: parent calls', done: ck('acc_chk_parents'), anchor: 'acc_anchor_chk_parents' },
    { key: 'chk_hifz', label: '\u0686\u06CC\u06A9: \u062D\u0641\u0638 \u062E\u0648\u062F \u062F\u06CC\u06A9\u06BE\u06CC', labelEn: 'Confirm: hifz seen', done: ck('acc_chk_hifz'), anchor: 'acc_anchor_chk_hifz' }
  ];
  if (isThu) {
    sections.push({
      key: 'chk_thu',
      label: '\u0686\u06CC\u06A9: \u062C\u0645\u0639\u0631\u0627\u062A \u0627\u0645\u062A\u062D\u0627\u0646',
      labelEn: 'Confirm: Thursday tests',
      done: ck('acc_chk_thu'),
      anchor: 'acc_anchor_chk_thu'
    });
  }
  const allDone = sections.every(s => s.done);
  const firstIncomplete = sections.find(s => !s.done);
  return { sections, allDone, firstIncompleteAnchor: firstIncomplete ? firstIncomplete.anchor : '' };

      html += '<div class="section"><h2>📈 پچھلے دنوں کی جوابدہی</h2>';
      html += '<div class="scroll-table"><table class="tbl"><thead><tr>';
      html += '<th>تاریخ</th><th>مکمل</th><th>کل</th><th>سکور</th><th>وقت</th>';
      html += '</tr></thead><tbody>';
      adminScores.forEach(s => {
        const sc = parseInt(s.score_pct||0);
        const c = sc>=80?'var(--gr)':sc>=50?'var(--yl)':'var(--rd)';
        html += `<tr>
          <td>${s.date}</td>
          <td>${s.completed_tasks}</td>
          <td>${s.total_tasks}</td>
          <td style="font-weight:800;color:${c}">${sc}%</td>
          <td style="font-size:9px">${s.submitted_at?new Date(s.submitted_at).toLocaleTimeString('ur-PK',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'}):'-'}</td>
        </tr>`;
      });
      html += '</tbody></table></div></div>';
    }

    } catch(err) {
      console.error('Admin tab error:', err);
      html += `<div class="section" style="border:2px solid var(--rd)"><h2>❌ خرابی</h2>
        <div style="font-size:11px;color:var(--rd)">${err.message}</div>
        <div style="font-size:10px;color:#8a9ab5;margin-top:8px">Console (F12) میں تفصیل دیکھیں</div>
      </div>`;
    }
  }

  // ═══════════════════════════════════════════
  // TAB: TEACHER ATTENDANCE
  // ═══════════════════════════════════════════
  if (activeTab === 'tAttend') {
    html += '<div class="section"><h2>👨‍🏫 اساتذہ کی آج کی حاضری</h2>';

    // Leave summary
    html += '<div class="grid" style="margin-bottom:16px">';
    teachers.forEach(t => {
      const att = tAttToday.find(r=>r.teacher_id===t.id);
      const ls = (DATA.leaveSummary||[]).find(r=>r.teacher_id===t.id);
      const status = att ? att.status : '—';
      const badgeCls = status==='present'?'p':status==='absent'?'a':status==='leave'?'l':status==='late'?'late':'';
      const approved = att ? att.approved : false;
      html += `<div class="card" style="border-right:4px solid ${status==='present'?'var(--gr)':status==='absent'?'var(--rd)':status==='leave'?'var(--bl)':'#555'}">
        <div style="font-weight:700;font-size:13px;margin-bottom:4px">${t.name}</div>
        <div><span class="badge ${badgeCls}">${status==='present'?'حاضر':status==='absent'?'غائب':status==='leave'?'رخصت':status==='late'?'تاخیر':'نامعلوم'}</span>
          ${att ? `<span class="badge ${approved?'approved':'pending'}" style="margin-right:4px">${approved?'✓ منظور':'⏳ زیر التوا'}</span>` : ''}
        </div>
        ${ls ? `<div style="font-size:9px;color:#8a9ab5;margin-top:6px">حاضر:${ls.present_days||0} رخصت:${ls.leave_days||0} غائب:${ls.absent_days||0} تاخیر:${ls.late_days||0}</div>` : ''}
        ${att && !approved ? `<button class="btn btn-gr btn-sm" style="margin-top:6px" onclick="approveTeacher('${t.id}')">✅ منظور</button>` : ''}
      </div>`;
    });
    html += '</div>';

    // Approve All
    const pending = tAttToday.filter(r=>!r.approved);
    if (pending.length) {
      html += `<button class="btn btn-gd" onclick="approveAll()">✅ سب منظور کریں (${pending.length})</button>`;
    }
    html += '</div>';

    // ═══ Evidence-based Verification Grid ═══
    html += '<div class="section"><h2>📊 تصدیق — مضمون و پیریڈ وار</h2>';
    html += '<div style="font-size:10px;color:#8a9ab5;margin-bottom:12px;line-height:1.5">جب کسی استاد نے طلبا کی حاضری لگائی یا رپورٹ جمع کی، تو یہ ثبوت ہے کہ وہ کلاس میں تھے۔ سرخ = کوئی ثبوت نہیں۔</div>';

    html += '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">';
    html += '<button class="btn btn-sm" style="font-size:9px;' + (tVerifyFilter === 'all' ? 'background:var(--gd);color:var(--dk)' : 'background:var(--dk3);color:#8a9ab5') + '" onclick="tVerifyFilter=\'all\';render();">سب درجے</button>';
    CLASS_ORDER.forEach(function(cid) {
      html += '<button class="btn btn-sm" style="font-size:9px;' + (tVerifyFilter === cid ? 'background:var(--gd);color:var(--dk)' : 'background:var(--dk3);color:#8a9ab5') + '" onclick="tVerifyFilter=\'' + cid + '\';render();">' + (CLASS_UR[cid] || cid) + '</button>';
    });
    html += '</div>';

    var evidenceAtt = new Set();
    (sAttToday || []).forEach(function(r) {
      if (r.teacher_id != null && r.subject_id != null) evidenceAtt.add(String(r.teacher_id) + '|' + String(r.subject_id));
    });
    var evidenceRep = new Set();
    (reportsToday || []).forEach(function(r) {
      if (r.teacher_id != null && r.subject_id != null) evidenceRep.add(String(r.teacher_id) + '|' + String(r.subject_id));
    });

    var verifyRows = [];
    (assignments || []).forEach(function(a) {
      if (a.teacher_id == null || a.subject_id == null) return;
      var sub = (subjects || []).find(function(s) { return String(s.id) === String(a.subject_id); });
      if (!sub) return;
      var cls = sub.class || sub.class_id || '';
      if (tVerifyFilter !== 'all' && cls !== tVerifyFilter) return;
      var t = (teachers || []).find(function(x) { return String(x.id) === String(a.teacher_id); });
      var per = (periods || []).find(function(p) { return String(p.id) === String(a.period_id); });
      var key = String(a.teacher_id) + '|' + String(a.subject_id);
      var hasAtt = evidenceAtt.has(key);
      var hasRep = evidenceRep.has(key);
      var verified = hasAtt || hasRep;
      var tAtt = (tAttToday || []).find(function(x) { return String(x.teacher_id) === String(a.teacher_id); });
      var selfStatus = tAtt ? tAtt.status : null;
      verifyRows.push({
        teacherId: a.teacher_id,
        teacherName: t ? t.name : a.teacher_id,
        subjectId: a.subject_id,
        subjectName: sub.name || a.subject_id,
        cls: cls,
        periodId: a.period_id,
        periodLabel: per ? (per.start_time + '–' + per.end_time) : ('P' + (a.period_id != null ? a.period_id : '?')),
        verified: verified,
        hasAtt: hasAtt,
        hasRep: hasRep,
        selfStatus: selfStatus
      });
    });

    var clsRank = {};
    CLASS_ORDER.forEach(function(c, i) { clsRank[c] = i; });
    verifyRows.sort(function(a, b) {
      var ca = clsRank[a.cls] != null ? clsRank[a.cls] : 99;
      var cb = clsRank[b.cls] != null ? clsRank[b.cls] : 99;
      if (ca !== cb) return ca - cb;
      var pa = a.periodId != null && !Number.isNaN(Number(a.periodId)) ? Number(a.periodId) : 99;
      var pb = b.periodId != null && !Number.isNaN(Number(b.periodId)) ? Number(b.periodId) : 99;
      if (pa !== pb) return pa - pb;
      return String(a.teacherName).localeCompare(String(b.teacherName), 'ur');
    });

    var vTotal = verifyRows.length;
    var vGreen = verifyRows.filter(function(r) { return r.verified; }).length;
    var vRed = vTotal - vGreen;
    var vPct = vTotal > 0 ? Math.round(vGreen / vTotal * 100) : 0;
    var summaryColor = vPct >= 80 ? 'var(--gr)' : vPct >= 50 ? 'var(--yl)' : 'var(--rd)';

    html += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;padding:12px;background:var(--dk);border-radius:12px;border:1px solid ' + summaryColor + '">';
    html += '<div style="text-align:center;flex:1;min-width:80px"><div style="font-size:28px;font-weight:800;color:' + summaryColor + '">' + vPct + '%</div><div style="font-size:9px;color:#8a9ab5">تصدیق شدہ</div></div>';
    html += '<div style="text-align:center;flex:1;min-width:60px"><div style="font-size:20px;font-weight:800;color:var(--gr)">' + vGreen + '</div><div style="font-size:9px;color:#8a9ab5">ثبوت ✓</div></div>';
    html += '<div style="text-align:center;flex:1;min-width:60px"><div style="font-size:20px;font-weight:800;color:var(--rd)">' + vRed + '</div><div style="font-size:9px;color:#8a9ab5">بغیر ثبوت</div></div>';
    html += '<div style="text-align:center;flex:1;min-width:60px"><div style="font-size:20px;font-weight:800;color:var(--gd)">' + vTotal + '</div><div style="font-size:9px;color:#8a9ab5">کل تفویضات</div></div>';
    html += '</div>';

    if (!verifyRows.length) {
      html += '<div style="text-align:center;padding:24px;color:#8a9ab5;font-size:12px">اس فلٹر کے لیے کوئی تفویض نہیں</div>';
    } else {
      var byClass = {};
      verifyRows.forEach(function(r) {
        var k = r.cls || '?';
        if (!byClass[k]) byClass[k] = [];
        byClass[k].push(r);
      });
      var classKeys = Object.keys(byClass);
      classKeys.sort(function(a, b) {
        return (clsRank[a] != null ? clsRank[a] : 99) - (clsRank[b] != null ? clsRank[b] : 99);
      });

      classKeys.forEach(function(cls) {
        var rows = byClass[cls];
        var clsVerified = rows.filter(function(r) { return r.verified; }).length;
        var clsTotal = rows.length;
        var clsPct = clsTotal > 0 ? Math.round(clsVerified / clsTotal * 100) : 0;
        var clsColor = clsPct >= 80 ? 'var(--gr)' : clsPct >= 50 ? 'var(--yl)' : 'var(--rd)';

        html += '<div style="margin-bottom:14px;border:1px solid #1f3d5e;border-radius:12px;overflow:hidden">';
        html += '<div style="background:var(--dk3);padding:10px 12px;display:flex;justify-content:space-between;align-items:center">';
        html += '<div style="display:flex;align-items:center;gap:8px"><span class="class-badge ' + escAttr(cls) + '">' + escHtml(CLASS_UR[cls] || cls) + '</span>';
        html += '<span style="font-size:12px;font-weight:700;color:var(--gd)">' + clsVerified + '/' + clsTotal + '</span></div>';
        html += '<span style="font-size:11px;font-weight:800;color:' + clsColor + '">' + clsPct + '%</span>';
        html += '</div>';

        html += '<div class="scroll-table" style="max-height:300px"><table class="tbl"><thead><tr>';
        html += '<th>پیریڈ</th><th>استاد</th><th>مضمون</th><th>خود رپورٹ</th><th>حاضری ✓</th><th>رپورٹ ✓</th><th>تصدیق</th>';
        html += '</tr></thead><tbody>';

        rows.forEach(function(r) {
          var selfBadge = '';
          if (r.selfStatus === 'present') selfBadge = '<span class="badge p">حاضر</span>';
          else if (r.selfStatus === 'absent') selfBadge = '<span class="badge a">غائب</span>';
          else if (r.selfStatus === 'leave') selfBadge = '<span class="badge l">رخصت</span>';
          else if (r.selfStatus === 'late') selfBadge = '<span class="badge late">تاخیر</span>';
          else selfBadge = '<span style="color:#555">—</span>';

          var attIcon = r.hasAtt ? '<span style="color:var(--gr);font-weight:800">✓</span>' : '<span style="color:#555">✗</span>';
          var repIcon = r.hasRep ? '<span style="color:var(--gr);font-weight:800">✓</span>' : '<span style="color:#555">✗</span>';

          var vBadge = '';
          if (r.verified) {
            vBadge = '<span class="badge p">ثابت ✓</span>';
          } else if (r.selfStatus === 'absent' || r.selfStatus === 'leave') {
            vBadge = '<span class="badge l">معذور</span>';
          } else {
            vBadge = '<span class="badge a">بغیر ثبوت</span>';
          }

          var rowBg = '';
          if (!r.verified && (!r.selfStatus || r.selfStatus === 'present')) rowBg = 'background:#ea433515';

          html += '<tr style="' + rowBg + '">';
          html += '<td style="font-weight:700">P' + (r.periodId != null ? r.periodId : '?') + '<div style="font-size:8px;color:#8a9ab5">' + escHtml(r.periodLabel) + '</div></td>';
          html += '<td>' + escHtml(r.teacherName) + '</td>';
          html += '<td>' + escHtml(r.subjectName) + '</td>';
          html += '<td>' + selfBadge + '</td>';
          html += '<td style="text-align:center">' + attIcon + '</td>';
          html += '<td style="text-align:center">' + repIcon + '</td>';
          html += '<td>' + vBadge + '</td>';
          html += '</tr>';
        });

        html += '</tbody></table></div></div>';
      });
    }

    var discrepancies = verifyRows.filter(function(r) {
      return !r.verified && r.selfStatus === 'present';
    });
    if (discrepancies.length > 0) {
      html += '<div style="margin-top:12px;padding:14px;background:#ea433522;border:1.5px solid #ea4335;border-radius:12px">';
      html += '<div style="font-weight:800;font-size:13px;color:var(--rd);margin-bottom:8px">⚠️ تضاد — حاضر بتایا مگر ثبوت نہیں (' + discrepancies.length + ')</div>';
      html += '<div style="font-size:10px;color:#fdba74;margin-bottom:10px">ان اساتذہ نے خود کو حاضر بتایا لیکن نہ طلبا کی حاضری لگائی نہ رپورٹ جمع کی</div>';
      discrepancies.forEach(function(r) {
        html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--dk);border-radius:8px;margin-bottom:4px;min-height:40px">';
        html += '<div><span style="font-weight:700;font-size:12px">' + escHtml(r.teacherName) + '</span>';
        html += '<span style="font-size:10px;color:#8a9ab5;margin-right:8px"> • ' + escHtml(r.subjectName) + ' • P' + (r.periodId != null ? r.periodId : '?') + '</span></div>';
        html += '<span class="class-badge ' + escAttr(r.cls) + '">' + escHtml(CLASS_UR[r.cls] || r.cls) + '</span>';
        html += '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
  }

  // ═══════════════════════════════════════════
  // TAB: STUDENT ATTENDANCE
  // ═══════════════════════════════════════════
  if (activeTab === 'sAttend') {
    var sDateElKeep = document.getElementById('sAttendDate');
    if (sDateElKeep && sDateElKeep.value) sAttendUi.date = sDateElKeep.value;

    var sAttendD = sAttendUi.date || TODAY;
    var rawRows;
    if (sAttendD === TODAY) {
      rawRows = DATA.sAttToday || [];
    } else if (sAttendHistorical.loading && sAttendHistorical.date === sAttendD) {
      rawRows = [];
    } else if (sAttendHistorical.date === sAttendD && sAttendHistorical.rows != null) {
      rawRows = sAttendHistorical.rows;
    } else {
      rawRows = [];
      if (!sAttendHistorical.loading) {
        setTimeout(function() { ensureSAttendRowsForUiDate(); }, 0);
      }
    }

    html += '<div class="section"><h2>' + (sAttendD === TODAY ? '👥 آج طلبا کی حاضری' : '👥 طلبا کی حاضری — ' + escHtml(sAttendD)) + '</h2>';

    if (sAttendD !== TODAY && sAttendHistorical.loading) {
      html += '<div class="loading" style="margin-bottom:10px">⏳ ' + escHtml(sAttendD) + ' کا ڈیٹا لوڈ ہو رہا ہے...</div>';
    }

    html += '<div class="filter-bar">';
    html += '<input type="date" id="sAttendDate" value="' + escAttr(sAttendUi.date || TODAY) + '" onchange="onSAttendDateChange(this.value)" title="تاریخ">';
    html += '<select id="sSubjectFilter" onchange="sAttendUi.subject=this.value;render();" style="min-width:120px">';
    html += '<option value="all"' + (sAttendUi.subject === 'all' ? ' selected' : '') + '>— تمام مضامین —</option>';
    (subjects || []).slice().sort(function(a, b) { return (a.name || '').localeCompare(b.name || '', 'ur'); }).forEach(function(s) {
      var sid = String(s.id);
      html += '<option value="' + escAttr(sid) + '"' + (String(sAttendUi.subject) === sid ? ' selected' : '') + '>' + escHtml(s.name || sid) + '</option>';
    });
    html += '</select>';
    html += '<select id="sClassFilter" onchange="sAttendUi.class=this.value;render();">';
    html += `<option value="all"${sAttendUi.class === 'all' ? ' selected' : ''}>سب درجے</option>`;
    Object.keys(CLASS_UR).forEach(c => {
      html += `<option value="${c}"${sAttendUi.class === c ? ' selected' : ''}>${CLASS_UR[c]}</option>`;
    });
    html += '</select>';
    html += '<select id="sStatusFilter" onchange="sAttendUi.status=this.value;render();">';
    html += `<option value="all"${sAttendUi.status === 'all' ? ' selected' : ''}>سب</option>`;
    html += `<option value="P"${sAttendUi.status === 'P' ? ' selected' : ''}>حاضر</option>`;
    html += `<option value="A"${sAttendUi.status === 'A' ? ' selected' : ''}>غائب</option>`;
    html += `<option value="L"${sAttendUi.status === 'L' ? ' selected' : ''}>رخصت</option>`;
    html += '</select>';
    html += `<input type="search" id="sSearch" placeholder="🔍 نام تلاش..." value="${escAttr(sAttendUi.search)}" oninput="sAttendUi.search=this.value;render();" style="flex:1;min-width:120px">`;
    html += '</div>';

    const classF = sAttendUi.class;
    const statusF = sAttendUi.status;
    const searchF = (sAttendUi.search || '').toLowerCase().trim();
    const subjF = sAttendUi.subject;

    let filtered = rawRows.slice();
    if (subjF !== 'all') {
      var subMeta = (subjects || []).find(function(s) { return String(s.id) === String(subjF); });
      var subName = subMeta && subMeta.name ? String(subMeta.name) : '';
      filtered = filtered.filter(function(r) {
        return String(r.subject_id) === String(subjF) || (subName && String(r.subject_name || '') === subName);
      });
    }
    if (classF !== 'all') filtered = filtered.filter(r => sAttendRowClass(r, students) === classF);
    if (statusF !== 'all') filtered = filtered.filter(r => r.status === statusF);
    if (searchF) {
      filtered = filtered.filter(r => {
        const st = students.find(s => s.id === r.student_id);
        const nm = (st && st.name) ? st.name.toLowerCase() : '';
        return nm.includes(searchF) || String(r.student_id).toLowerCase().includes(searchF);
      });
    }

    filtered.sort((a, b) => {
      const pa = sAttendInferPeriod(a, assignments);
      const pb = sAttendInferPeriod(b, assignments);
      const na = pa == null ? 1e6 : pa;
      const nb = pb == null ? 1e6 : pb;
      if (na !== nb) return na - nb;
      const sCmp = (a.subject_name || '').localeCompare(b.subject_name || '', 'ur');
      if (sCmp) return sCmp;
      const tCmp = (a.teacher_name || '').localeCompare(b.teacher_name || '', 'ur');
      if (tCmp) return tCmp;
      const sta = students.find(s => s.id === a.student_id);
      const stb = students.find(s => s.id === b.student_id);
      return (sta && sta.name || '').localeCompare(stb && stb.name || '', 'ur');
    });

    const groups = [];
    let cur = null;
    for (const r of filtered) {
      const gk = sAttendGroupKey(r, assignments);
      if (!cur || cur.gk !== gk) {
        cur = {
          gk,
          pNum: sAttendInferPeriod(r, assignments),
          subject_name: r.subject_name || '',
          teacher_name: r.teacher_name || '',
          rows: []
        };
        groups.push(cur);
      }
      cur.rows.push(r);
    }

    const fP = filtered.filter(r => r.status === 'P').length;
    const fA = filtered.filter(r => r.status === 'A').length;
    const fL = filtered.filter(r => r.status === 'L').length;
    html += `<div style="display:flex;gap:12px;margin-bottom:10px;font-size:11px;flex-wrap:wrap">
      <span style="color:var(--gr)">✅ حاضر: ${fP}</span>
      <span style="color:var(--rd)">❌ غائب: ${fA}</span>
      <span style="color:var(--yl)">📝 رخصت: ${fL}</span>
      <span style="color:#8a9ab5">کل: ${filtered.length}</span>
      ${classF !== 'all' ? `<span style="color:var(--gd)">درجہ: ${CLASS_UR[classF] || classF}</span>` : ''}
    </div>`;

    if (!filtered.length) {
      html += '<div style="text-align:center;padding:24px;color:#8a9ab5;font-size:12px">اس فلٹر کے لیے کوئی اندراج نہیں۔</div>';
    } else {
      groups.forEach(g => {
        const pLabel = g.pNum == null ? 'پیریڈ ؟' : ('پیریڈ ' + g.pNum);
        html += '<div style="margin-bottom:14px;border:1px solid #1f3d5e;border-radius:12px;overflow:hidden">';
        html += `<div style="background:var(--dk3);padding:10px 12px;font-size:12px;font-weight:800;color:var(--gd)">
          🕐 ${pLabel} — ${g.subject_name || '—'} — ${g.teacher_name || '—'}
          <span style="font-weight:600;color:#8a9ab5;font-size:10px;margin-right:8px">(${g.rows.length})</span>
        </div>`;
        html += '<div class="scroll-table" style="max-height:260px"><table class="tbl"><thead><tr>';
        html += '<th>طالب علم</th><th>درجہ</th><th>حاضری</th><th>رابطہ</th>';
        html += '</tr></thead><tbody>';
        g.rows.forEach(r => {
          const st = students.find(s => s.id === r.student_id);
          const phone = st && st.phone ? st.phone : '';
          const rc = sAttendRowClass(r, students);
          html += `<tr>
            <td style="font-weight:700">${st ? st.name : r.student_id}</td>
            <td><span class="class-badge ${rc}">${CLASS_UR[rc] || rc || ''}</span></td>
            <td><span class="badge ${r.status.toLowerCase()}">${r.status === 'P' ? 'حاضر' : r.status === 'A' ? 'غائب' : 'رخصت'}</span></td>
            <td>${phone ? `<a href="tel:${phone}" class="call-btn">📞</a>` : ''}</td>
          </tr>`;
        });
        html += '</tbody></table></div></div>';
      });
    }
    html += '</div>';
  }

  // ═══════════════════════════════════════════
  // TAB: DAILY REPORTS
  // ═══════════════════════════════════════════
  if (activeTab === 'reports') {

      if (vt === 'students') {

        html += '<div style="text-align:center;padding:30px;color:#8a9ab5;font-size:12px">اس فلٹر کے لیے کوئی اندراج نہیں</div>';

              else if (val === 'L' || val === 'leave') style = 'color:var(--bl);font-weight:700';
              else if (val === 'late') style = 'color:var(--yl);font-weight:700';
            }
            if (c === 'complete') {
              if (val === 'ہاں') style = 'color:var(--gr);font-weight:700';
              else if (val === 'جزوی') style = 'color:var(--yl);font-weight:700';
              else if (val === 'نہیں') style = 'color:var(--rd);font-weight:700';
            }
            if (c === 'class' && CLASS_UR[val]) {
              var badge = '<span class="class-badge ' + escAttr(val) + '">' + escHtml(CLASS_UR[val]) + '</span>';
              html += '<td>' + badge + '</td>';

          });
          html += '</tr>';
        });
        html += '</tbody></table></div>';
        if (filtered.length > 200) {
          html += '<div style="text-align:center;padding:10px;color:#8a9ab5;font-size:10px">صرف پہلی 200 سطریں دکھائی گئیں — مکمل ڈیٹا CSV سے حاصل کریں</div>';
        }
      }
      html += '</div>';
    }

    html += '</div>';
  }

  document.getElementById('app').innerHTML = html;
  if (activeTab === TAB_ACCOUNTABILITY) {
    if (accountabilityDraft) {
      restoreAccountabilityDraft(accountabilityDraft);
      initAccountabilityAfterDraftRestore();

      initAdminInspectClassFromSaved();

    window.initAccountabilityChecklistUi && window.initAccountabilityChecklistUi();
  }
  if (activeTab === 'sAttend' && sAttendUi.search.length) {
    const inp = document.getElementById('sSearch');
    if (inp) {

  if (activeTab === 'export' && exportView.table && exportView.filter.search) {
    var expSearch = document.getElementById('expViewSearch');
    if (expSearch) {
      expSearch.focus();
      var L2 = exportView.filter.search.length;
      try { expSearch.setSelectionRange(L2, L2); } catch (e2) {}
    }
  }
}

// ACTIONS

function switchTab(id) { activeTab = id; render(); }

async function refresh() {
  toast('⏳ تازہ ہو رہا ہے...');
  await loadAll();
  render();
  toast('✅ تازہ');
}

async function approveTeacher(tid) {
  const ok = await sbPatch('teacher_attendance',
    'date=eq.'+TODAY+'&teacher_id=eq.'+tid,
    {approved:true, approved_by:'admin', approved_at:new Date().toISOString()}
  );
  if (ok) { toast('✅ منظور'); await loadAll(); render(); }
  else toast('❌ ناکام');
}

async function approveAll() {
  const ok = await sbPatch('teacher_attendance',
    'date=eq.'+TODAY+'&approved=eq.false',
    {approved:true, approved_by:'admin', approved_at:new Date().toISOString()}
  );
  if (ok) { toast('✅ سب منظور'); await loadAll(); render(); }
  else toast('❌ ناکام');
}

async function markTask(taskId, taskName, currentlyDone) {
  try {
    const newState = !currentlyDone;
    const r = await fetch(SB_URL+'/rest/v1/admin_tasks?on_conflict=date,task_id', {
      method:'POST', headers:{...headers,'Prefer':'resolution=merge-duplicates'},
      body: JSON.stringify({date:TODAY, task_id:taskId, task_name:taskName, completed:newState, completed_at:newState?new Date().toISOString():null})
    });
    if (r.ok) { toast(newState?'✅ مکمل':'↩️ واپس'); await loadAll(); render(); }
    else toast('❌ ناکام');
  } catch(e) { toast('❌ '+e.message); }
}

async function exportCSV(table, colStr) {
  const from = document.getElementById('expFrom')?.value || TODAY;
  const to = document.getElementById('expTo')?.value || TODAY;
  toast('⏳ لوڈ ہو رہا ہے...');
  try {
    let params = 'select='+colStr+'&order=created_at.desc&limit=5000';
    if (table !== 'students') params += '&date=gte.'+from+'&date=lte.'+to;
    const data = await sb(table, params);
    if (!data.length) { toast('⚠️ خالی'); return; }
    const cols = colStr.split(',');
    const header = cols.join(',');
    const rows = data.map(r => cols.map(c => '"'+(String(r[c]||'')).replace(/"/g,'""')+'"').join(','));
    const csv = '\uFEFF'+header+'\n'+rows.join('\n');
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=table+'_'+from+'_to_'+to+'.csv';
    a.click(); URL.revokeObjectURL(url);
    toast('✅ ڈاؤنلوڈ — '+data.length+' سطریں');
  } catch(e) { toast('❌ '+e.message); }
}

async function fetchExportView(table, colStr) {
  const from = document.getElementById('expFrom')?.value || TODAY;
  const to = document.getElementById('expTo')?.value || TODAY;
  exportView.table = table;
  exportView.data = null;
  exportView.loading = true;
  exportView.filter = { teacher: '', cls: '', status: '', slot: '', search: '' };
  render();
  try {
    var orderPart = table === 'students' ? 'order=name.asc' : 'order=created_at.desc';
    let params = 'select=' + colStr + '&' + orderPart + '&limit=500';
    if (table !== 'students') params += '&date=gte.' + from + '&date=lte.' + to;
    const data = await sb(table, params);
    exportView.data = Array.isArray(data) ? data : [];
    exportView.loading = false;
    render();
  } catch (e) {
    exportView.loading = false;
    exportView.data = [];
    toast('❌ ' + e.message);
    render();
  }
}

function clearExportView() {
  exportView.table = null;
  exportView.data = null;
  exportView.loading = false;
  exportView.filter = { teacher: '', cls: '', status: '', slot: '', search: '' };
  render();
}

function setExpFilter(key, val) {
  exportView.filter[key] = val;
  render();
}

function applyExportFilters(data, table) {
  if (!data || !data.length) return data;
  var f = exportView.filter;
  var out = data.slice();
  if (f.teacher) {
    var tRec = (DATA.teachers || []).find(function(t) { return String(t.id) === String(f.teacher); });
    var tName = tRec && tRec.name ? String(tRec.name) : '';
    out = out.filter(function(r) {
      var tid = String(f.teacher);
      return String(r.teacher_id) === tid || String(r.examiner_id) === tid || String(r.qari_id) === tid || String(r.marked_by) === tid
        || (tName && (r.teacher_name === tName || r.examiner_name === tName || r.marked_by_name === tName));
    });
  }
  if (f.cls) {
    out = out.filter(function(r) {
      return (r['class'] || r.class_id || '') === f.cls;
    });
  }
  if (f.status) {
    out = out.filter(function(r) {
      return r.status === f.status || r.complete === f.status;
    });
  }
  if (f.slot) {
    out = out.filter(function(r) { return r.slot === f.slot; });
  }
  if (f.search) {
    var q = f.search.toLowerCase();
    out = out.filter(function(r) { return JSON.stringify(r).toLowerCase().indexOf(q) >= 0; });
  }
  return out;
}

function exportFilteredCSV() {
  if (!exportView.data || !exportView.data.length || !exportView.table) { toast('⚠️ خالی'); return; }
  var exp = exports_list.find(function(e) { return e.id === exportView.table; });
  if (!exp) return;
  var filtered = applyExportFilters(exportView.data, exportView.table);
  if (!filtered.length) { toast('⚠️ فلٹر شدہ ڈیٹا خالی'); return; }
  var cols = exp.cols.split(',');
  var header = cols.join(',');
  var rows = filtered.map(function(r) { return cols.map(function(c) { return '"' + (String(r[c] || '')).replace(/"/g, '""') + '"'; }).join(','); });
  var csv = '\uFEFF' + header + '\n' + rows.join('\n');
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = exportView.table + '_filtered.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('✅ فلٹر شدہ ڈاؤنلوڈ — ' + filtered.length + ' سطریں');
}

window.refreshVisitsListUI = function () {
  const el = document.getElementById('acc_visits_list');
  const store = document.getElementById('acc_class_obs');
  const hint = document.getElementById('acc_class_obs_score_hint');
  if (!store) return;
  const visits = parseVisitObservations(store.value);
  if (el) el.innerHTML = formatVisitObsCardsHtml(visits);
  if (hint) {
    const nonLeg = visits.filter(v => !v.legacy);
    if (!nonLeg.length) {
      hint.textContent = visits.some(v => v.legacy) ? '\u067E\u0631\u0627\u0646\u0627 \u0645\u062A\u0646' : '';
    } else {
      const okN = nonLeg.filter(visitBlockScoresOk).length;
      hint.textContent = okN + '/' + nonLeg.length + ' \u062F\u0631\u062C\u06D2' + (classObsScoringOk(store.value) ? ' \u2713' : ' (\u06AF\u0631\u062F: 3\u00D7Q&A \u06CC\u0627 15+ \u062D\u0631\u0641 \u0642\u062F\u06CC\u0645)');
    }
  }
  if (document.getElementById('acc_checklist_banner')) window.scheduleAccountabilityChecklistRefresh && window.scheduleAccountabilityChecklistRefresh();
};

window.saveClassVisitObservation = function () {
  const sel = document.getElementById('acc_inspect_class_sel');
  const store = document.getElementById('acc_class_obs');
  if (!sel || !store) return;
  const classId = sel.value;
  if (!classId) { toast('\u26A0 \u067E\u06C1\u0644\u06D2 \u062F\u0631\u062C\u06C1 \u0645\u0646\u062A\u062E\u0628 \u06A9\u0631\u06CC\u06BA'); return; }
  const { qa, narrative } = readAccVisitQaFromDom();
  if (!visitHasThreeValidQa(qa)) {
    toast('\u26A0 \u06AF\u0631\u062F \u06A9\u06D2 \u0644\u06CC\u06D2 3 \u0645\u06A9\u0645\u0644 \u0633\u0648\u0627\u0644-\u062C\u0648\u0627\u0628 (\u06A9\u0633 \u0633\u06D2\u060C \u0633\u0648\u0627\u0644\u060C \u062C\u0648\u0627\u0628\u060C \u06A9\u0645 \u0627\u0632 \u06A9\u0645 2 \u062D\u0631\u0648\u0641)');
    return;
  }
  let visits = parseVisitObservations(store.value);
  if (visits.some(v => v.legacy)) visits = [];
  const idx = visits.findIndex(v => v.classId === classId);
  const entry = { classId, structured: true, qa, narrative };
  if (idx >= 0) visits[idx] = entry; else visits.push(entry);
  store.value = serializeVisitObservations(visits);
  toast('\u2713 \u0645\u062D\u0641\u0648\u0638');
  window.refreshVisitsListUI();
  if (document.getElementById('acc_checklist_banner')) window.scheduleAccountabilityChecklistRefresh && window.scheduleAccountabilityChecklistRefresh();
};

    sel.value = '';

window.removeClassVisitObs = function (classId) {
  const store = document.getElementById('acc_class_obs');
  if (!store) return;
  if (!classId) store.value = '';
  else {
    let visits = parseVisitObservations(store.value).filter(v => v.classId !== classId);
    visits = visits.filter(v => !v.legacy);
    store.value = serializeVisitObservations(visits);

  window.refreshVisitsListUI();
  const sel = document.getElementById('acc_inspect_class_sel');

  if (document.getElementById('acc_checklist_banner')) window.scheduleAccountabilityChecklistRefresh && window.scheduleAccountabilityChecklistRefresh();
};

/** Load Q&A form from hidden store for this class; optional slot teacher prefills row 1 when new. */
function loadAccVisitFormForClass(classId, slotAsg) {
  const store = document.getElementById('acc_class_obs');
  if (!classId) {
    window.fillAccVisitQaForm([], '');
    const narEl = document.getElementById('acc_visit_narrative');
    if (narEl) narEl.value = '';
    if (document.getElementById('acc_checklist_banner')) window.scheduleAccountabilityChecklistRefresh && window.scheduleAccountabilityChecklistRefresh();
    return;
  }
  const vs = store ? parseVisitObservations(store.value).filter(v => !v.legacy) : [];
  const ex = vs.find(x => x.classId === classId);
  if (ex && ex.structured) {
    window.fillAccVisitQaForm(ex.qa, ex.narrative);
  } else if (ex && !ex.structured && (ex.text || '').trim()) {
    window.fillAccVisitQaForm([], '');
    const narEl = document.getElementById('acc_visit_narrative');
    if (narEl) narEl.value = (ex.text || '').trim();
  } else {
    window.fillAccVisitQaForm([], '');
    if (slotAsg && slotAsg.teacher_id) {
      const w1 = document.getElementById('acc_qa_who_type_1');
      if (w1) w1.value = 'teacher';
      window.refreshAccVisitQaWhoRow(1);
      const id1 = document.getElementById('acc_qa_who_id_1');
      if (id1) id1.value = slotAsg.teacher_id;
    }
  }
  if (document.getElementById('acc_checklist_banner')) window.scheduleAccountabilityChecklistRefresh && window.scheduleAccountabilityChecklistRefresh();
}

window.onInspectClassChange = async function (opts) {
  const preserveTa = opts && opts.preserveTextarea;
  const skipVisitQaReload = opts && opts.skipVisitQaReload;
  const sel = document.getElementById('acc_inspect_class_sel');
  const ta = document.getElementById('acc_class_visited');
  const prev = document.getElementById('acc_inspect_preview');
  if (!sel || !ta || !prev) return;
  const classId = sel.value;
  if (!classId) {
    prev.innerHTML = '<span style="color:#8a9ab5">\u062F\u0631\u062C\u06C1 \u0645\u0646\u062A\u062E\u0628 \u06A9\u0631\u06CC\u06BA \u2014 \u0645\u0648\u062C\u0648\u062F\u06C1 \u0648\u0642\u062A \u06A9\u06D2 \u067E\u06CC\u0631\u06CC\u0688\u060C \u0645\u0636\u0645\u0648\u0646\u060C \u0622\u062C \u06A9\u0627 \u06C1\u062F\u0641/\u0627\u0635\u0644\u060C \u0627\u0648\u0631 \u06AF\u0632\u0634\u062A\u06C1 \u0631\u067E\u0648\u0631\u0679 \u06CC\u06C1\u0627\u06BA \u0622\u0626\u06D2 \u06AF\u06CC</span>';
    if (!preserveTa) ta.value = '';
    if (!skipVisitQaReload) loadAccVisitFormForClass('', null);
    window.updateAccClassVisitedCounter();
    return;
  }
  const { periods, assignments, subjects, teachers, reportsToday } = DATA;
  const slot = resolveClassInspectionSlot(periods, assignments, subjects, classId);
  const textLines = [];
  const linesHtml = [];
  textLines.push('[' + classId + '] ' + (CLASS_UR[classId] || classId));
  linesHtml.push('<div style="font-weight:800;color:var(--gd)">' + escHtml(CLASS_UR[classId] || classId) + '</div>');
  if (!slot) {
    const msg = '\u0627\u0633 \u062F\u0631\u062C\u06D2 \u06A9\u06D2 \u0644\u06CC\u06D2 \u0622\u062C \u06A9\u06CC \u062A\u0641\u0648\u06CC\u0636 \u0646\u06C1\u06CC\u06BA \u0645\u0644\u06CC';
    textLines.push(msg);
    linesHtml.push('<div style="margin-top:6px;color:#fdba74">' + escHtml(msg) + '</div>');
    prev.innerHTML = linesHtml.join('');
    if (!preserveTa || !(ta.value || '').trim()) ta.value = textLines.join('\n');
    window.updateAccClassVisitedCounter();
    if (!skipVisitQaReload) loadAccVisitFormForClass(classId, null);
    return;
  }
  const { period, assignment: asg, when } = slot;
  const sub = subjects.find(s => s.id === asg.subject_id);
  const tm = teachers.find(t => t.id === asg.teacher_id);
  const head = when === 'current' ? '\u0645\u0648\u062C\u0648\u062F\u06C1 \u0648\u0642\u062A \u2014 \u067E\u06CC\u0631\u06CC\u0688 ' + period.id : '\u062C\u062F\u0648\u0644 \u2014 \u067E\u06CC\u0631\u06CC\u0688 ' + period.id;
  const line2 = head + ' (' + period.start_time + '\u2013' + period.end_time + '): ' + (sub ? sub.name : asg.subject_id) + ' \u2014 \u0627\u0633\u062A\u0627\u0630: ' + (tm ? tm.name : asg.teacher_id);
  textLines.push(line2);
  linesHtml.push('<div style="font-weight:800;color:var(--gd);margin-top:6px">' + escHtml(head) + '</div>');
  linesHtml.push('<div>' + escHtml((sub ? sub.name : asg.subject_id) + ' \u2014 ' + (tm ? tm.name : asg.teacher_id)) + '</div>');
  linesHtml.push('<div style="font-size:10px;color:#8a9ab5">' + escHtml(period.start_time + '\u2013' + period.end_time) + '</div>');
  const todayR = (reportsToday || []).find(r => r.teacher_id === asg.teacher_id && r.subject_id === asg.subject_id);
  const tp = todayR && todayR.target_page != null ? todayR.target_page : '\u2014';
  const ap = todayR && todayR.actual_page != null ? todayR.actual_page : '\u2014';
  const todayTxt = '\u0622\u062C: \u06C1\u062F\u0641 \u0635\u0641\u062D\u06C1 ' + tp + ' \u00B7 \u0627\u0635\u0644 ' + ap + (todayR && todayR.complete ? ' \u00B7 ' + todayR.complete : '');
  textLines.push(todayTxt);
  linesHtml.push('<div style="margin-top:8px;padding-top:8px;border-top:1px solid #1f3d5e"><strong>\u0622\u062C</strong>: \u06C1\u062F\u0641 \u0635\u0641\u062D\u06C1 <strong>' + escHtml(String(tp)) + '</strong> \u00B7 \u0627\u0635\u0644 <strong>' + escHtml(String(ap)) + '</strong>' + (todayR && todayR.complete ? ' \u00B7 ' + escHtml(String(todayR.complete)) : '') + '</div>');
  window._inspectClassSeq = (window._inspectClassSeq | 0) + 1;
  const inspectRun = window._inspectClassSeq;
  const taSnapshot = ta.value;
  let lastTxt = '';
  try {
    const lr = await sb('daily_reports', 'teacher_id=eq.' + encodeURIComponent(asg.teacher_id) + '&subject_id=eq.' + encodeURIComponent(asg.subject_id) + '&date=lt.' + TODAY + '&select=date,target_page,actual_page,complete&order=date.desc&limit=1');
    if (lr && lr[0]) {
      lastTxt = '\u06AF\u0632\u0634\u062A\u06C1 \u0631\u067E\u0648\u0631\u0679 (' + lr[0].date + '): \u06C1\u062F\u0641 ' + (lr[0].target_page != null ? lr[0].target_page : '\u2014') + ' \u00B7 \u0627\u0635\u0644 ' + (lr[0].actual_page != null ? lr[0].actual_page : '\u2014');
      linesHtml.push('<div style="margin-top:8px;padding-top:8px;border-top:1px solid #1f3d5e"><strong>\u06AF\u0632\u0634\u062A\u06C1</strong> (' + escHtml(String(lr[0].date)) + '): \u06C1\u062F\u0641 ' + escHtml(String(lr[0].target_page != null ? lr[0].target_page : '\u2014')) + ' \u00B7 \u0627\u0635\u0644 ' + escHtml(String(lr[0].actual_page != null ? lr[0].actual_page : '\u2014')) + '</div>');
    } else {
      lastTxt = '\u06AF\u0632\u0634\u062A\u06C1 \u0631\u067E\u0648\u0631\u0679: \u06A9\u0648\u0626\u06CC \u067E\u0631\u0627\u0646\u06CC \u0627\u0646\u062F\u0631\u0627\u062C \u0646\u06C1\u06CC\u06BA';
      linesHtml.push('<div style="margin-top:8px;font-size:10px;color:#8a9ab5">' + escHtml(lastTxt) + '</div>');
    }
  } catch (e) {
    lastTxt = '\u06AF\u0632\u0634\u062A\u06C1 \u0631\u067E\u0648\u0631\u0679: \u0644\u0648\u0688 \u0646\u0627\u06A9\u0627\u0645';
    linesHtml.push('<div style="margin-top:8px;color:#f97316">' + escHtml(lastTxt) + '</div>');
  }
  textLines.push(lastTxt);
  if (inspectRun !== window._inspectClassSeq) return;
  if (sel.value !== classId) return;
  prev.innerHTML = linesHtml.join('');
  if (!preserveTa) {
    if (ta.value === taSnapshot) ta.value = textLines.join('\n');
  } else if (!(ta.value || '').trim()) {
    ta.value = textLines.join('\n');
  }
  window.updateAccClassVisitedCounter();
  if (!skipVisitQaReload) loadAccVisitFormForClass(classId, asg);
};

// SUBMIT ACCOUNTABILITY REPORT
// ═══════════════════════════════════════════
async function submitAccountability() {
  try {
    if (typeof window.syncAbsentActionsToHidden === 'function') window.syncAbsentActionsToHidden();
    if (typeof window.syncHifzNotesToHidden === 'function') window.syncHifzNotesToHidden();
    const g = id => document.getElementById(id);
    const v = id => (g(id)||{}).value||'';
    const ck = id => (g(id)||{}).checked||false;
    const ni = id => { const x=v(id); return x===''?null:parseInt(x); };

    const payload = {
      date: TODAY,
      absent_students_entered: ni('acc_absent'),
      behind_subjects_entered: ni('acc_behind'),
      coverage_details: v('acc_coverage')||null,
      class_visited: v('acc_class_visited')||null,
      class_observations: v('acc_class_obs')||null,
      absent_actions: v('acc_absent_actions')||null,
      syllabus_notes: DATA.adminReport ? (DATA.adminReport.syllabus_notes ?? null) : null,
      hifz_notes: v('acc_hifz')||null,
      general_remarks: v('acc_remarks')||null,
      called_parents: ck('acc_chk_parents'),
      checked_hifz: ck('acc_chk_hifz'),
      reviewed_thursday: ck('acc_chk_thu'),
      submitted_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    };

    const r = await fetch(SB_URL+'/rest/v1/admin_accountability?on_conflict=date', {
      method:'POST', headers:{...headers,'Prefer':'resolution=merge-duplicates'},
      body: JSON.stringify(payload)
    });
    if (r.ok) { toast('✅ رپورٹ جمع — جزاک اللہ'); await loadAll(); render(); }
    else { const e = await r.text(); toast('❌ ناکام: '+e); }
  } catch(e) { toast('❌ '+e.message); }
}
