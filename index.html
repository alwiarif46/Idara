<script>
// One-time: unregister SW + delete iri-* caches (stale index.html still referenced `thuMap` TDZ for some users)
(function () {
  var k = 'iri_purge_stale_index_v1';
  try {
    if (localStorage.getItem(k)) return;
    localStorage.setItem(k, '1');
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (rs) {
        rs.forEach(function (r) { r.unregister(); });
      }).catch(function () {});
    }
    if ('caches' in window) {
      caches.keys().then(function (names) {
        return Promise.all(names.filter(function (n) { return /^iri-/i.test(n); }).map(function (n) { return caches.delete(n); }));
      }).catch(function () {});
    }
  } catch (e) {}
})();
// One-time (v16): loading gate moved after all derived code — bust any HTML cache still on v15
(function () {
  var k = 'iri_purge_react310_sw_v16';
  try {
    if (localStorage.getItem(k)) return;
    localStorage.setItem(k, '1');
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (rs) {
        rs.forEach(function (r) { r.unregister(); });
      }).catch(function () {});
    }
    if ('caches' in window) {
      caches.keys().then(function (names) {
        return Promise.all(names.filter(function (n) { return /^iri-/i.test(n); }).map(function (n) { return caches.delete(n); }));
      }).catch(function () {});
    }
  } catch (e) {}
})();
// Service Worker (query busts cached sw.js)
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js?v=iri-app-v17').catch(function () {});
window.addEventListener('online',()=>document.getElementById('offlineBar').classList.remove('show'));
window.addEventListener('offline',()=>document.getElementById('offlineBar').classList.add('show'));
if(!navigator.onLine)document.getElementById('offlineBar').classList.add('show');

// LocalStorage persistence layer
function _stLoad(k){try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch(e){return null;}}
function _stSave(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function _stDel(k){try{localStorage.removeItem(k);}catch(e){}}
</script>

<script>
const {
  useState,
  useMemo,
  useCallback,
  useEffect,
  useRef
} = React;

if (typeof window !== 'undefined') {
  window.__IRI_INDEX = 'purge-sw-v16-2026-04-16-no-mid-return';
  try { console.log('[iri] index script build', window.__IRI_INDEX); } catch (e) {}
}

/** Stable empty Thursday bundle — useMemo must not return a fresh object each render when !cfg */
const EMPTY_THURSDAY_DERIVED = { thuDates: [], thuSch: [], weeks: [], thuEligibleIds: [], thuEligibleAsg: [] };

/** Pure Thursday bundle from cfg — lives outside App so hooks never touch a `thuMap` TDZ. */
function buildThursdayDerived(cfg) {
  if (!cfg || !cfg.institution) return EMPTY_THURSDAY_DERIVED;
  const teachers = cfg.teachers;
  const assignments = cfg.assignments;
  if (!Array.isArray(teachers) || !Array.isArray(assignments)) return EMPTY_THURSDAY_DERIVED;
  try {
    const thuDates = genThursdays(cfg.institution);
    const examiners = teachers.filter(t => t.exam).map(t => t.id);
    const thuSch = genThuSch(thuDates, examiners);
    const thuEligibleIds = teachers.filter(t => !['T7', 'T8', 'T9'].includes(t.id)).map(t => t.id);
    const thuEligibleAsg = assignments.filter(a => thuEligibleIds.includes(a.t));
    const weeks = genThuMap(thuEligibleAsg, thuEligibleIds, thuDates);
    return { thuDates, thuSch, weeks, thuEligibleIds, thuEligibleAsg };
  } catch (e) {
    console.warn('[buildThursdayDerived]', e);
    return EMPTY_THURSDAY_DERIVED;
  }
}

function App() {
  const [loading, setLoading] = useState(true);
  const [cfg, setCfgRaw] = useState(null);
  const [reps, setRepsRaw] = useState({});
  const [syncQ, setSyncQRaw] = useState([]);
  const [scr, setScr] = useState('login');
  const [user, setUser] = useState(null);
  const [pin, setPin] = useState('');
  const [selT, setSelT] = useState('');
  const [err, setErr] = useState('');
  const [tab, setTab] = useState('home');
  const [toast, setToast] = useState('');
  const [prayerTimes, setPrayerTimes] = useState(null);
  const [hijriDate, setHijriDate] = useState(null);
  const [alerts, setAlerts] = useState([]);
  const [admSub, setAdmSub] = useState(null);
  const [syncSt, setSyncSt] = useState(null);
  const syncSentRef = React.useRef({});
  const [loginEmail, setLoginEmail] = useState('');
  const [loginStep, setLoginStep] = useState(1);
  const [otpCode, setOtpCode] = useState('');
  const [otpSending, setOtpSending] = useState(false);
  const [isAdminLogin, setIsAdminLogin] = useState(false);
  const [showForm, setShowForm] = useState(null);
  const [newT, setNewT] = useState({
    id: '',
    n: '',
    exam: false,
    email: ''
  });
  const [newAsg, setNewAsg] = useState({
    t: '',
    sub: '',
    p: '',
    edit: ''
  });
  const [newPer, setNewPer] = useState({
    s: '',
    e: '',
    type: 'class'
  });
  const [newMT, setNewMT] = useState({id:'', n:'', role:'teacher', email:''});
  const [newMSec, setNewMSec] = useState({id:'', name:'', display_name:'', classes_included:''});
  const [newMSub, setNewMSub] = useState({id:'', n:'', modern_class:'', s:'', e:''});
  const [newMAsg, setNewMAsg] = useState({t:'', sub:'', sec:'', p:''});
  const [newMStu, setNewMStu] = useState({id:'', n:'', parent:'', phone:'', residence:'', modern_class:'', section_id:''});
  const [mStuFilter, setMStuFilter] = useState('all');
  const [mStuSearch, setMStuSearch] = useState('');
  const [dashFilter, setDashFilter] = useState('all');
  const [confirmDel, setConfirmDel] = useState(null);
  const [pinEdit, setPinEdit] = useState({
    tid: '',
    val: ''
  });
  const [urlInp, setUrlInp] = useState('');
  const [ttView, setTtView] = useState(0);
  const [ttClass, setTtClass] = useState('');
  const [ttOpen, setTtOpen] = useState(null);
  const [mTtOpen, setMTtOpen] = useState(null);
  const [ttSubTab, setTtSubTab] = useState('progress');
  const [repOpen, setRepOpen] = useState(null);
  const [dAttSlot, setDAttSlot] = useState('fajr');
  const [dAttClass, setDAttClass] = useState('all');
  const [dAttSearch, setDAttSearch] = useState('');
  const [dAttend, setDAttendRaw] = useState({});
  const [covers, setCovers] = useState({});
  const [students, setStudentsRaw] = useState([]);
  const [hifzLogs, setHifzLogsRaw] = useState({});
  const [studFilter, setStudFilter] = useState('all');
  const [studSearch, setStudSearch] = useState('');
  const [hifzEntry, setHifzEntry] = useState(null);
  const [showStudForm, setShowStudForm] = useState(false);
  const [studFormEditId, setStudFormEditId] = useState(null);
  const [newStud, setNewStud] = useState({id:'',n:'',parent:'',phone:'',residence:'',c:'hifz',qari:'T8',status:'active'});

  const [modernTeachers, setModernTeachers] = useState([]);
  const [modernSections, setModernSections] = useState([]);
  const [modernSubjects, setModernSubjects] = useState([]);
  const [modernPeriods, setModernPeriods] = useState([]);
  const [modernAssignments, setModernAssignments] = useState([]);
  const [modernStudents, setModernStudents] = useState([]);
  const [allTeachers, setAllTeachers] = useState([]);

  const [thWk, setThWk] = useState(null);
  const [thuStore, setThuStore] = useState({});
  const [thOpen, setThOpen] = useState(null);
  const [sAttend, setSAttendRaw] = useState({});
  const [tAttend, setTAttendRaw] = useState({});
  const [attExpand, setAttExpand] = useState({});
  // Self-attendance states
  const [myAtt, setMyAtt] = useState('');
  const [myLeaves, setMyLeaves] = useState(null);
  const [coverageAlert, setCoverageAlert] = useState(null);
  const [teacherAttHist, setTeacherAttHist] = useState({});
  const [syllabusTgtOpen, setSyllabusTgtOpen] = useState(null);
  // Reports states
  const [rptType, setRptType] = useState('student_attendance');
  const [rptData, setRptData] = useState(null);
  const [rptLoading, setRptLoading] = useState(false);
  const [rptDateFrom, setRptDateFrom] = useState('');
  const [rptDateTo, setRptDateTo] = useState('');
  const [rptFilter, setRptFilter] = useState('');
  const [rptTeacher, setRptTeacher] = useState('');
  const [rptClass, setRptClass] = useState('');
  const [rptStatus, setRptStatus] = useState('');
  const [rptSlot, setRptSlot] = useState('');
  const saveTimer = useRef(null);
  const pendingStudentDelRef = useRef({ timerId: null, student: null });
  const [studentDelUndo, setStudentDelUndo] = useState(null);
  // Early-bind CL so hooks before the full destructuring never hit TDZ
  const CL = (cfg && cfg.classes) || [];

  const thursdayDerived = useMemo(() => buildThursdayDerived(cfg), [cfg]);

  // Wrapped setters that auto-persist
  const setCfg = useCallback(updater => {
    setCfgRaw(prev => {
      const next = typeof updater === 'function' ? updater(prev) : {
        ...prev,
        ...updater
      };
      clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(() => saveConfig(next), 300);
      return next;
    });
  }, []);
  const setReps = useCallback(updater => {
    setRepsRaw(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveReports(next);
      return next;
    });
  }, []);
  const setSyncQ = useCallback(updater => {
    setSyncQRaw(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveSyncQ(next);
      return next;
    });
  }, []);
  const setStudents = useCallback(updater => {
    setStudentsRaw(prev => { const next = typeof updater==='function'?updater(prev):updater; saveStudents(next); return next; });
  }, []);
  const setHifzLogs = useCallback(updater => {
    setHifzLogsRaw(prev => { const next = typeof updater==='function'?updater(prev):updater; saveHifzLogs(next); return next; });
  }, []);
  const setSAttend = useCallback(updater => {
    setSAttendRaw(prev => { const next = typeof updater==='function'?updater(prev):updater; saveSAttend(next); return next; });
  }, []);
  const setTAttend = useCallback(updater => {
    setTAttendRaw(prev => { const next = typeof updater==='function'?updater(prev):updater; saveTAttend(next); return next; });
  }, []);
  const setDAttend = useCallback(updater => {
    setDAttendRaw(prev => { const next = typeof updater==='function'?updater(prev):updater; saveDAttend(next); return next; });
  }, []);


  // Load on mount
  useEffect(() => {
    (async () => {
      const [savedCfg, savedReps, savedQ, savedStudents, savedHifz, savedSA, savedTA, savedDA] = await Promise.all([
        loadConfig(), loadReports(), loadSyncQ(), loadStudents(), loadHifzLogs(), loadSAttend(), loadTAttend(), loadDAttend()
      ]);

      var url = (savedCfg && savedCfg.supabase_url) || DEFAULTS.supabase_url;
      var key = (savedCfg && savedCfg.supabase_key) || DEFAULTS.supabase_key;

      var cfg;
      try {
        var dbData = await fetchFullConfigFromSupabase(url, key);
        cfg = {
          _version: DEFAULTS._version || 11,
          supabase_url: url,
          supabase_key: key,
          ...dbData
        };
        console.log('[BOOT] Loaded from Supabase:', cfg.teachers.length, 'teachers,', cfg.subjects.length, 'subjects,', cfg.students.length, 'students');
      } catch (e) {
        console.warn('[BOOT] Supabase unavailable, falling back to localStorage:', e.message || e);
        if (savedCfg && savedCfg.teachers && savedCfg.teachers.length) {
          cfg = { ...savedCfg };
          if (!cfg.supabase_url) cfg.supabase_url = url;
          if (!cfg.supabase_key) cfg.supabase_key = key;
        } else {
          cfg = {
            _version: 11, supabase_url: url, supabase_key: key,
            teachers: [], subjects: [], assignments: [], periods: [], classes: [], students: [], pins: {},
            institution: { name_ur: 'ادارہ تحقیقات اسلامی', name_en: 'Imam Azam College', term_start: '2026-04-01', term_end: '2026-05-30', teaching_days: 42, off_day: 5, revision_day: 4 },
            scoring: { excellent: 80, good: 60, weak: 40 }, dashboard: { yellow: -5 },
            admin_creds: { username: 'admin', password: 'idara2026' }, holidays: []
          };
          console.error('[BOOT] No data source available — app will be empty until Supabase is reachable');
        }
      }

      setCfgRaw(cfg);
      saveConfig(cfg);

      try {
        var modernData = await fetchModernDataFromSupabase(url, key);
        setModernTeachers(modernData.modernTeachers);
        setModernSections(modernData.modernSections);
        setModernSubjects(modernData.modernSubjects);
        setModernPeriods(modernData.modernPeriods);
        setModernAssignments(modernData.modernAssignments);
        setModernStudents(modernData.modernStudents);
        console.log('[BOOT] Modern data:', modernData.modernTeachers.length, 'teachers,', modernData.modernAssignments.length, 'assignments,', modernData.modernStudents.length, 'students');
      } catch (e) {
        console.warn('[BOOT] Modern data fetch failed (non-critical):', e.message || e);
      }

      var initialStud = cfg.students && cfg.students.length ? cfg.students :
        (savedStudents && savedStudents.length ? savedStudents.map(normalizeStudentRow).filter(Boolean) : []);
      setStudentsRaw(initialStud);

      setRepsRaw(savedReps || {});
      setSyncQRaw(savedQ || []);
      setHifzLogsRaw(savedHifz || {});
      setSAttendRaw(savedSA || {});
      setTAttendRaw(savedTA || {});
      setDAttendRaw(savedDA || {});
      setLoading(false);
    })();
  }, []);

  // Request notification permission
  useEffect(() => {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }, []);

  // Auto-sync all students to Supabase (once per day)
  useEffect(() => {
    if (loading || !cfg || !cfg.supabase_url || !cfg.supabase_key || !students.length) return;
    const today = new Date().toISOString().split('T')[0];
    const lastSync = localStorage.getItem('iri-students-synced');
    if (lastSync === today) return;
    syncPost('bulk_students', { students: students })
      .then(d => { if (d && d.success) localStorage.setItem('iri-students-synced', today); })
      .catch(() => {});
  }, [loading, cfg && cfg.supabase_url, students.length]);

  // Load self-attendance + leave count + coverage alerts
  useEffect(() => {
    if (loading || !cfg || !cfg.supabase_url || !cfg.supabase_key || !user) return;
    const todayDt = new Date().toISOString().split('T')[0];
    const saved = localStorage.getItem('iri-myatt-' + todayDt);
    if (saved) setMyAtt(saved);
    // Fetch leave summary
    fetch(cfg.supabase_url + '/rest/v1/teacher_leave_summary?teacher_id=eq.' + user.id, {
      headers: { 'apikey': cfg.supabase_key }
    }).then(r=>r.json()).then(d => {
      if (d && d.length) setMyLeaves(d[0]);
    }).catch(()=>{});
    // Fetch coverage alerts (who is absent/leave today?)
    fetch(cfg.supabase_url + '/rest/v1/teacher_attendance?date=eq.' + todayDt + '&status=in.(absent,leave)', {
      headers: { 'apikey': cfg.supabase_key }
    }).then(r=>r.json()).then(d => {
      if (d && d.length) {
        const alerts = d.filter(r => r.teacher_id !== user.id).map(r => {
          const t = teachers.find(x=>x.id===r.teacher_id);
          const tName = t ? t.n : r.teacher_id;
          const pers = assignments.filter(a=>a.t===r.teacher_id).map(a => {
            const sub = subjects.find(s=>s.id===a.sub);
            return sub ? ('P'+a.p+' '+sub.n) : ('P'+a.p);
          });
          return { name: tName, status: r.status, periods: pers };
        });
        if (alerts.length) setCoverageAlert(alerts);
      }
    }).catch(()=>{});
  }, [loading, user && user.id]);

  // Teacher self attendance history (term → today) for dynamic syllabus targets
  useEffect(() => {
    if (loading) return;
    if (!cfg || !cfg.supabase_url || !cfg.supabase_key || !user || user.role === 'admin' || user.role === 'qari') {
      setTeacherAttHist({});
      return;
    }
    const ts = (cfg.institution && cfg.institution.term_start) || '';
    if (!ts) return;
    const todayDt = new Date().toISOString().split('T')[0];
    const url = cfg.supabase_url + '/rest/v1/teacher_attendance?teacher_id=eq.' + encodeURIComponent(user.id) + '&date=gte.' + ts + '&date=lte.' + todayDt + '&select=date,status';
    fetch(url, { headers: { apikey: cfg.supabase_key } }).then(r => r.json()).then(rows => {
      if (!Array.isArray(rows)) return;
      const map = {};
      rows.forEach(row => {
        if (row && row.date) map[row.date] = row.status;
      });
      setTeacherAttHist(map);
    }).catch(() => setTeacherAttHist({}));
  }, [loading, cfg && cfg.supabase_url, cfg && cfg.supabase_key, cfg && cfg.institution && cfg.institution.term_start, user && user.id, user && user.role]);

  // Watch daily attendance for 3x absent and fire notification
  useEffect(() => {
    if (!CL.length) return;
    const todayDt = new Date().toISOString().split('T')[0];
    const allSlots = ['fajr','salam','zuhr','asr','maghrib','isha'];
    const allStudents = students.filter(s => s.status !== 'left');
    const newAlerts = [];
    allStudents.forEach(s => {
      let absentCount = 0;
      allSlots.forEach(slot => {
        const key = slot + '_' + todayDt;
        const slotData = dAttend[key] || {};
        if (slotData[s.id] === 'A') absentCount++;
      });
      if (absentCount >= 3) {
        const cls = CL.find(c => c.id === s.c);
        newAlerts.push({ id: s.id, name: s.n, cls: cls ? cls.n : s.c, count: absentCount, date: todayDt });
      }
    });
    if (newAlerts.length > 0) {
      setAlerts(newAlerts);
      newAlerts.forEach(a => {
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification('\u26A0\uFE0F ' + a.name + ' \u2014 ' + a.count + ' \u0628\u0627\u0631 \u063A\u0627\u0626\u0628', {
            body: a.cls + ' \u2022 ' + a.id + ' \u2022 ' + a.date,
            tag: 'absent-' + a.id + '-' + a.date,
            requireInteraction: true
          });
        }
      });
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 800; osc.type = 'sine';
        gain.gain.value = 0.3;
        osc.start(); osc.stop(ctx.currentTime + 0.15);
        setTimeout(() => { const o2 = ctx.createOscillator(); o2.connect(gain); o2.frequency.value = 1000; o2.type = 'sine'; o2.start(); o2.stop(ctx.currentTime + 0.15); }, 200);
        setTimeout(() => { const o3 = ctx.createOscillator(); o3.connect(gain); o3.frequency.value = 1200; o3.type = 'sine'; o3.start(); o3.stop(ctx.currentTime + 0.2); }, 400);
      } catch(e) {}
    } else {
      setAlerts([]);
    }
  }, [dAttend, students, CL]);

  // Fetch prayer times from Aladhan API
  useEffect(() => {
    const fetchPrayer = async () => {
      try {
        const now = new Date();
        const dd = String(now.getDate()).padStart(2,'0');
        const mm = String(now.getMonth()+1).padStart(2,'0');
        const yyyy = now.getFullYear();
        const cached = localStorage.getItem('iri-prayer-'+dd+mm+yyyy);
        if (cached) { const c = JSON.parse(cached); setPrayerTimes(c.timings); setHijriDate(c.hijri); return; }
        const r = await fetch('https://api.aladhan.com/v1/timings/'+dd+'-'+mm+'-'+yyyy+'?latitude=33.7307&longitude=75.1504&method=1&school=1&tune=0,-1,0,-1,0,2,0,0,0');
        const d = await r.json();
        if (d.code === 200) {
          setPrayerTimes(d.data.timings);
          setHijriDate(d.data.date.hijri);
          localStorage.setItem('iri-prayer-'+dd+mm+yyyy, JSON.stringify({timings:d.data.timings, hijri:d.data.date.hijri}));
        }
      } catch(e) { console.log('Prayer API error:', e); }
    };
    fetchPrayer();
  }, []);

  // Load Nastaliq font
  useEffect(() => {
    if (!document.querySelector('link[href*="Noto+Nastaliq+Urdu"]')) {
      const l = document.createElement('link');
