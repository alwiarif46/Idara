function calcTD(cfg){
  const st=new Date(cfg.term_start+'T00:00:00'),now=new Date();let c=0;
  for(let d=new Date(st);d<=now;d.setDate(d.getDate()+1)){
    const w=d.getDay();
    if(w!==cfg.off_day&&w!==cfg.revision_day&&!cfg.holidays?.includes(d.toISOString().split('T')[0]))c++;
  }
  return Math.min(Math.max(c,1),cfg.teaching_days);
}
function genThursdays(cfg){
  const st=new Date(cfg.term_start+'T00:00:00'),en=new Date(cfg.term_end+'T00:00:00');
  const dates=[];for(let d=new Date(st);d<=en;d.setDate(d.getDate()+1)){if(d.getDay()===cfg.revision_day)dates.push(d.toISOString().split('T')[0]);}
  return dates;
}
function genThuSch(dates,examiners){return dates.map((dt,i)=>({wk:i+1,dt,ex:examiners.length?examiners[i%examiners.length]:null}));}
function cSR(sc,ab,scoring){
  if(ab)return{t:null,p:null,c:'absent'};const f=sc.filter(s=>s!=null&&s!=='');
  if(!f.length)return{t:null,p:null,c:null};const n=f.map(Number);
  if(n.some(x=>isNaN(x)||x<0||x>10))return{t:null,p:null,c:'invalid'};
  const t=n.reduce((a,b)=>a+b,0),p=Math.round(t/(f.length*10)*100);
  return{t,p,c:p>=scoring.excellent?'excellent':p>=scoring.good?'good':p>=scoring.weak?'weak':'fail'};
}

  const addT=()=>{const{id,n,exam,email}=newT;if(!id.trim()||!n.trim()){flash('⚠️ غلط');return}if(teachers.find(t=>t.id===id)){flash('⚠️ موجود');return}updCfg('teachers',[...teachers,{id,n,role:'teacher',exam,email:email.trim().toLowerCase()}]);updCfg('pins',{...pins,[id]:'1234'});setNewT({id:'',n:'',exam:false,email:''});setShowForm(null);flash('✓');};

  const syncPost=async(type,payload)=>{if(!cfg.script_url){flash('⚠️ URL نہیں');return{success:false};}setSyncSt('sending');const body={type,...payload,submitted_at:new Date().toISOString()};try{

      {/* ASSIGNMENTS */}
      {admSub==='assign'&&<div><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><Bk onClick={goHome}/><Ttl icon="📋" text="تفویض"/><Btn small color={ST.gd} onClick={()=>setShowForm(showForm==='a'?null:'a')}>{showForm==='a'?'✗':'+'}</Btn></div>
      {showForm==='a'&&<Card style={{border:`2px solid ${ST.gd}40`}}><Sel value={newAsg.t} onChange={v=>setNewAsg(p=>({...p,t:v}))} style={{marginBottom:6}}><option value="">— استاد —</option>{teachers.filter(t=>t.role!=='principal').map(t=><option key={t.id} value={t.id}>{t.n} ({tA(t.id)})</option>)}</Sel><Sel value={newAsg.sub} onChange={v=>setNewAsg(p=>({...p,sub:v}))} style={{marginBottom:6}}><option value="">— مضمون ({unassigned.length}) —</option>{unassigned.map(s=><option key={s.id} value={s.id}>{s.n} ({gC(CL,s.c).n})</option>)}</Sel><Sel value={newAsg.p} onChange={v=>setNewAsg(p=>({...p,p:v}))} style={{marginBottom:8}}><option value="">— پیریڈ —</option>{cPer.map(p=><option key={p.id} value={p.id}>P{p.id}: {p.s}–{p.e}</option>)}</Sel><Btn full color="#10b981" onClick={addAsg}>✓</Btn></Card>}
      <div style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse',fontSize:9,minWidth:500}}><thead><tr style={{background:ST.dk}}><th style={{padding:6,color:ST.gd,textAlign:'right',position:'sticky',right:0,background:ST.dk,zIndex:1,minWidth:70}}>استاد</th>{cPer.map(p=><th key={p.id} style={{padding:4,color:'#8fbc8f',textAlign:'center',minWidth:55,direction:'ltr',fontFamily:'monospace',fontSize:8}}>{p.s}<br/>{p.e}</th>)}</tr></thead><tbody>{teachers.filter(t=>t.role!=='principal').map(t=><tr key={t.id} style={{borderBottom:'1px solid #e5e0d5'}}><td style={{padding:'6px 4px',fontWeight:700,fontSize:10,textAlign:'right',position:'sticky',right:0,background:'#fff',zIndex:1}}>{t.n}</td>{cPer.map(p=>{const asg=assignments.find(a=>a.t===t.id&&a.p===p.id);if(!asg)return <td key={p.id} style={{padding:2}}><div style={{height:36,borderRadius:6,background:'#f5f0e8',border:'1px dashed #d5d0c5'}}/></td>;const sub=gS(asg.sub);if(!sub)return <td key={p.id}/>;const cl=gC(CL,sub.c);return(<td key={p.id} style={{padding:2}}><div style={{background:cl.c,borderRadius:6,padding:'4px 3px',textAlign:'center',position:'relative',height:36,display:'flex',flexDirection:'column',justifyContent:'center'}}><div style={{fontSize:8,fontWeight:700,color:cl.a,lineHeight:1.2}}>{sub.n}</div><div style={{fontSize:7,color:'#999'}}>{cl.n}</div><button onClick={()=>rmAsg(t.id,asg.sub)} style={{position:'absolute',top:-4,left:-4,width:14,height:14,borderRadius:'50%',background:'#ef4444',border:'none',color:'#fff',fontSize:8,cursor:'pointer',lineHeight:'14px',padding:0}}>✗</button></div></td>);})}</tr>)}</tbody></table></div><div style={{fontSize:10,color:ST.mt,textAlign:'center',marginTop:8}}>{assignments.length} تفویض • {unassigned.length} باقی</div></div>}

      {/* PINS */}
      {admSub==='pins'&&<div><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><Bk onClick={goHome}/><Ttl icon="🔐" text="پن"/><div/></div>
      <Card style={{background:`linear-gradient(135deg,${ST.dk},${ST.gn})`}}><div style={{color:ST.gd,fontSize:11,fontWeight:700}}>ایڈمن: {pins.ADMIN}</div><div style={{display:'flex',gap:6,marginTop:6}}><Inp value={pinEdit.tid==='ADMIN'?pinEdit.val:''} onChange={v=>setPinEdit({tid:'ADMIN',val:v})} placeholder="نیا" style={{flex:1,color:'#fff',background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',direction:'ltr',textAlign:'center'}}/><Btn small color={ST.gd} onClick={()=>{if(pinEdit.tid==='ADMIN'&&pinEdit.val.length===4){updCfg('pins',{...pins,ADMIN:pinEdit.val});setPinEdit({tid:'',val:''});flash('✓');}else flash('⚠️');}}>محفوظ</Btn></div></Card>
      {teachers.map(t=><Card key={t.id} style={{display:'flex',alignItems:'center',gap:8,padding:'10px 13px'}}><div style={{flex:1}}><div style={{fontSize:12,fontWeight:700}}>{t.n}</div><div style={{fontSize:10,color:'#999',fontFamily:'monospace'}}>{pins[t.id]||'1234'}</div></div><Inp value={pinEdit.tid===t.id?pinEdit.val:''} onChange={v=>setPinEdit({tid:t.id,val:v})} placeholder="نیا" style={{width:55,direction:'ltr',textAlign:'center',fontSize:13,fontWeight:800}}/><Btn small color="#10b981" onClick={()=>{if(pinEdit.tid===t.id&&pinEdit.val.length===4){updCfg('pins',{...pins,[t.id]:pinEdit.val});setPinEdit({tid:'',val:''});flash('✓');}else flash('⚠️');}}>✓</Btn><Btn small color="#f59e0b" onClick={()=>{updCfg('pins',{...pins,[t.id]:'1234'});flash('↺');}}>↺</Btn></Card>)}</div>}

      {/* SYNC */}
      {admSub==='sync'&&<div><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><Bk onClick={goHome}/><Ttl icon="🔄" text="سنک"/><div/></div>
      <Card><Row label="Apps Script URL"><Inp value={urlInp||cfg.script_url} onChange={v=>setUrlInp(v)} placeholder="https://script.google.com/macros/s/.../exec" style={{direction:'ltr',fontSize:10}}/></Row><div style={{display:'flex',gap:6}}><Btn full small color="#10b981" onClick={()=>{const u=(urlInp||'').trim();if(!u){flash('⚠️');return}updCfg('script_url',u);setUrlInp('');flash('✓');}}>محفوظ</Btn><Btn full small color="#3b82f6" disabled={!cfg.script_url} onClick={async()=>{try{const r=await fetch(cfg.script_url+'?action=ping');const d=await r.json();flash(d.success?'✓ کامیاب':'⚠️');}catch{flash('⚠️ ناکام');}}}>ٹیسٹ</Btn></div></Card>
      {cfg.script_url?<Card style={{background:'#f0fdf4',borderRight:'4px solid #10b981'}}><div style={{fontSize:10,color:'#065f46'}}>✓ URL سیٹ</div><div style={{fontSize:8,color:'#166534',fontFamily:'monospace',direction:'ltr',wordBreak:'break-all'}}>{cfg.script_url}</div></Card>:<Card style={{background:'#fef2f2',borderRight:'4px solid #ef4444'}}><div style={{fontSize:10,color:'#991b1b'}}>⚠️ URL نہیں</div></Card>}
      <Card style={{textAlign:'center',padding:16}}><div style={{fontSize:28}}>{syncQ.length===0?'✅':'⏳'}</div><div style={{fontSize:13,fontWeight:800,color:syncQ.length?'#f59e0b':'#10b981'}}>{syncQ.length===0?'سب ارسال':`${syncQ.length} زیر التوا`}</div>{syncQ.length>0&&<Btn small style={{marginTop:10}} onClick={processQ}>ابھی ارسال</Btn>}</Card></div>}

      {/* RESET TO DEFAULTS */}
      {admSub==='reset'&&<div><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><Bk onClick={goHome}/><Ttl icon="🔁" text="ری سیٹ"/><div/></div>
      <Card style={{textAlign:'center',padding:20}}><div style={{fontSize:28}}>⚠️</div><div style={{fontSize:13,fontWeight:800,color:'#ef4444',marginTop:6}}>تمام ترتیبات ڈیفالٹ پر واپس</div><div style={{fontSize:10,color:'#999',margin:'8px 0 16px'}}>اساتذہ، مضامین، تفویض، اوقات، پن — سب ری سیٹ ہوں گے</div>
      <Btn full color="#ef4444" onClick={async()=>{try{await _stDel("iri-config");await _stDel("iri-reports");await _stDel("iri-syncq");}catch{}setCfgRaw({...DEFAULTS});setRepsRaw({});setSyncQRaw([]);flash('✓ ری سیٹ');goHome();}}>ری سیٹ کریں</Btn></Card></div>}

    </div>}
    </div>

    <div style={{position:'fixed',bottom:0,left:0,right:0,background:'#fff',borderTop:'1px solid #e5e0d5',display:'flex',justifyContent:'space-around',padding:'5px 0 9px',zIndex:100}}>{tabs.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setAdmSub(null);setShowForm(null);}} style={{background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:1,color:tab===t.id?ST.dk:'#b5b0a5',fontFamily:'inherit',padding:'2px 10px'}}><span style={{fontSize:18,transform:tab===t.id?'scale(1.1)':'scale(1)',transition:'transform 0.2s'}}>{t.ic}</span><span style={{fontSize:8,fontWeight:700}}>{t.l}</span>{tab===t.id&&<div style={{width:14,height:2.5,borderRadius:2,background:ST.gd}}/>}</button>)}</div>
  </div>);
}

// Render
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
