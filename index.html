  // Load on mount
  useEffect(() => {
    (async () => {
      const [saved, savedReps, savedQ, savedStudents, savedHifz, savedSA, savedTA, savedDA] = await Promise.all([loadConfig(), loadReports(), loadSyncQ(), loadStudents(), loadHifzLogs(), loadSAttend(), loadTAttend(), loadDAttend()]);
      if (saved) {
        const sv = saved._version || 0;
        const dv = DEFAULTS._version || 0;
        let merged;
        if (sv < dv) {
          // New version: take DEFAULTS structure, preserve user data
          merged = { ...DEFAULTS };
          // Preserve user-edited fields
          if (saved.pins) merged.pins = { ...DEFAULTS.pins, ...saved.pins };
          if (saved.assignments && saved.assignments.length > 0) merged.assignments = saved.assignments;
          if (saved.supabase_url) merged.supabase_url = saved.supabase_url;
          if (saved.supabase_key) merged.supabase_key = saved.supabase_key;
          if (saved.admin_creds) merged.admin_creds = saved.admin_creds;
          if (saved.scoring) merged.scoring = { ...DEFAULTS.scoring, ...saved.scoring };
          if (saved.dashboard) merged.dashboard = { ...DEFAULTS.dashboard, ...saved.dashboard };
          if (saved.holidays) merged.holidays = saved.holidays;
          if (saved.institution) {
            // Preserve user-changed institution settings but take new defaults for unchanged fields
            merged.institution = { ...DEFAULTS.institution, ...saved.institution };
          }
          // Subjects, teachers, periods, classes always come from DEFAULTS on version bump
          // This ensures page range fixes and new subjects take effect
          console.log('Config upgraded: v' + sv + ' → v' + dv);
        } else {
          // Same version: use saved config entirely
          merged = { ...DEFAULTS, ...saved };
          merged.pins = { ...DEFAULTS.pins, ...(saved.pins || {}) };
          if (!merged.supabase_url) merged.supabase_url = DEFAULTS.supabase_url;
        }
        merged._version = dv;
        setCfgRaw(merged);
      } else {
        setCfgRaw({ ...DEFAULTS });

      setSyncQRaw(savedQ || []);
      setStudentsRaw(savedStudents || DEFAULTS.students || []);
      setHifzLogsRaw(savedHifz || {});
      setSAttendRaw(savedSA || {});
      setTAttendRaw(savedTA || {});

  useEffect(() => {

    const today = new Date().toISOString().split('T')[0];

  // Load self-attendance + leave count + coverage alerts
  useEffect(() => {

    const todayDt = new Date().toISOString().split('T')[0];
    const saved = localStorage.getItem('iri-myatt-' + todayDt);

    }).catch(()=>{});
    // Fetch coverage alerts (who is absent/leave today?)
    fetch(cfg.supabase_url + '/rest/v1/teacher_attendance?date=eq.' + todayDt + '&status=in.(absent,leave)', {
      headers: { 'apikey': cfg.supabase_key }
    }).then(r=>r.json()).then(d => {
      if (d && d.length) {
        const alerts = d.filter(r => r.teacher_id !== user.id).map(r => {
          const t = teachers.find(x=>x.id===r.teacher_id);
          const tName = t ? t.n : r.teacher_id;
          const pers = assignments.filter(a=>a.t===r.teacher_id).map(a => {
            const sub = subjects.find(s=>s.id===a.sub);
            return sub ? ('P'+a.p+' '+sub.n) : ('P'+a.p);
          });
          return { name: tName, status: r.status, periods: pers };
        });
        if (alerts.length) setCoverageAlert(alerts);
      }
    }).catch(()=>{});
  }, [loading, user && user.id]);

  // Teacher self attendance history (term → today) for dynamic syllabus targets
  useEffect(() => {
    if (loading) return;
    if (!cfg || !cfg.supabase_url || !cfg.supabase_key || !user || user.role === 'admin' || user.role === 'qari') {
      setTeacherAttHist({});
      return;
    }
    const ts = (cfg.institution && cfg.institution.term_start) || '';
    if (!ts) return;
    const todayDt = new Date().toISOString().split('T')[0];
    const url = cfg.supabase_url + '/rest/v1/teacher_attendance?teacher_id=eq.' + encodeURIComponent(user.id) + '&date=gte.' + ts + '&date=lte.' + todayDt + '&select=date,status';
    fetch(url, { headers: { apikey: cfg.supabase_key } }).then(r => r.json()).then(rows => {
      if (!Array.isArray(rows)) return;
      const map = {};
      rows.forEach(row => {
        if (row && row.date) map[row.date] = row.status;
      });
      setTeacherAttHist(map);
    }).catch(() => setTeacherAttHist({}));
  }, [loading, cfg && cfg.supabase_url, cfg && cfg.supabase_key, cfg && cfg.institution && cfg.institution.term_start, user && user.id, user && user.role]);

  // Watch daily attendance for 3x absent and fire notification
  useEffect(() => {
    if (!CL.length) return;
    const todayDt = new Date().toISOString().split('T')[0];
    const allSlots = ['fajr','salam','zuhr','asr','maghrib','isha'];
    const allStudents = students.filter(s => s.status !== 'left');
    const newAlerts = [];
    allStudents.forEach(s => {
      let absentCount = 0;
      allSlots.forEach(slot => {
        const key = slot + '_' + todayDt;
        const slotData = dAttend[key] || {};
        if (slotData[s.id] === 'A') absentCount++;
      });
      if (absentCount >= 3) {
        const cls = CL.find(c => c.id === s.c);
        newAlerts.push({ id: s.id, name: s.n, cls: cls ? cls.n : s.c, count: absentCount, date: todayDt });
      }
    });
    if (newAlerts.length > 0) {
      setAlerts(newAlerts);
      newAlerts.forEach(a => {
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification('\u26A0\uFE0F ' + a.name + ' \u2014 ' + a.count + ' \u0628\u0627\u0631 \u063A\u0627\u0626\u0628', {
            body: a.cls + ' \u2022 ' + a.id + ' \u2022 ' + a.date,
            tag: 'absent-' + a.id + '-' + a.date,
            requireInteraction: true
          });
        }
      });
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 800; osc.type = 'sine';
        gain.gain.value = 0.3;
        osc.start(); osc.stop(ctx.currentTime + 0.15);
        setTimeout(() => { const o2 = ctx.createOscillator(); o2.connect(gain); o2.frequency.value = 1000; o2.type = 'sine'; o2.start(); o2.stop(ctx.currentTime + 0.15); }, 200);
        setTimeout(() => { const o3 = ctx.createOscillator(); o3.connect(gain); o3.frequency.value = 1200; o3.type = 'sine'; o3.start(); o3.stop(ctx.currentTime + 0.2); }, 400);
      } catch(e) {}
    } else {
      setAlerts([]);
    }
  }, [dAttend, students, CL]);

  // Fetch prayer times from Aladhan API
  useEffect(() => {
    const fetchPrayer = async () => {
      try {
        const now = new Date();
        const dd = String(now.getDate()).padStart(2,'0');

        const cached = localStorage.getItem('iri-prayer-'+dd+mm+yyyy);
        if (cached) { const c = JSON.parse(cached); setPrayerTimes(c.timings); setHijriDate(c.hijri); return; }
        const r = await fetch('https://api.aladhan.com/v1/timings/'+dd+'-'+mm+'-'+yyyy+'?latitude=33.7307&longitude=75.1504&method=1&school=1&tune=0,-1,0,-1,0,2,0,0,0');
        const d = await r.json();
        if (d.code === 200) {
          setPrayerTimes(d.data.timings);
          setHijriDate(d.data.date.hijri);
          localStorage.setItem('iri-prayer-'+dd+mm+yyyy, JSON.stringify({timings:d.data.timings, hijri:d.data.date.hijri}));

  // Load Nastaliq font

  // Init Thursday test grids — one per assignment slot, persisted per week
  const [thuStore, setThuStore] = useState({});

  const flash = useCallback(m => {
    setToast(m);
    setTimeout(() => setToast(''), 2500);
  }, []);
  // ── Supabase REST helper ──
  const sbPost = async (table, rows, conflictCols) => {
    let url = cfg.supabase_url + '/rest/v1/' + table;
    if (conflictCols) url += '?on_conflict=' + conflictCols;
    const r = await fetch(url, {
      method: 'POST',
      headers: {
        'apikey': cfg.supabase_key,
        'Authorization': 'Bearer ' + cfg.supabase_key,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify(Array.isArray(rows) ? rows : [rows])
    });
    if (!r.ok) { const e = await r.text(); throw new Error(e); }
    return { success: true };
  };

  const syncPost = async (type, payload) => {
    if (!cfg.supabase_url || !cfg.supabase_key) {
      flash('⚠️ URL نہیں');
      return { success: false };
    }
    // ── Debounce: same type+key within 3 seconds = skip ──
    const dk = type + '_' + (payload.date || '') + '_' + (payload.teacher_id || payload.marked_by || payload.student_id || '') + '_' + (payload.class_id || payload.week || '');
    const now = Date.now();
    if (syncSentRef.current[dk] && now - syncSentRef.current[dk] < 3000) {
      console.log('[SYNC] debounce skip:', dk);
      return { success: true, note: 'DEBOUNCED' };
    }
    syncSentRef.current[dk] = now;
    const keys = Object.keys(syncSentRef.current);
    if (keys.length > 50) keys.filter(k => now - syncSentRef.current[k] > 10000).forEach(k => delete syncSentRef.current[k]);

    setSyncSt('sending');
    try {
      switch (type) {
        case 'daily_report': {
          const rows = payload.entries.map(e => ({
            date: payload.date, teacher_id: payload.teacher_id, teacher_name: payload.teacher_name || '',
            subject_id: e.subject_id, subject_name: e.subject_name || '', class: e.class_id || '',
            period_id: e.period || null, target_page: e.target_page, actual_page: e.actual_page,
            complete: e.complete || '', reason: e.reason_code || ''
          }));
          await sbPost('daily_reports', rows, 'date,teacher_id,subject_id');
          break;
        }
        case 'thursday_test': {
          const rows = payload.blocks.map(b => ({
            date: payload.date, week_num: payload.week, examiner_id: payload.teacher_id,
            examiner_name: payload.examiner_name || '',
            subject_id: b.subject_id, subject_name: b.subject_name || '', class: b.class_id || '',
            period_id: b.period || null, subject_teacher_id: b.subject_teacher_id || '',
            subject_teacher_name: b.subject_teacher_name || '', portion: b.portion || '',
            excellent: b.excellent||0, good: b.good||0, weak: b.weak||0,
            fail: b.fail||0, absent: b.absent||0, average: b.average||0,
            notes: b.notes || '', suggestions: b.suggestions || ''
          }));
          await sbPost('thursday_tests', rows, 'date,examiner_id,subject_id');
          break;
        }
        case 'hifz_progress': {
          await sbPost('hifz_progress', {
            date: payload.date, student_id: payload.student_id, student_name: payload.student_name || '',
            paras: payload.paras||0, soorah: payload.soorah||'', aayat: payload.aayat||0,
            daur_para: payload.daur_para||'', qari_id: payload.qari_id||'', notes: payload.notes||''
          }, 'date,student_id');
          break;
        }
        case 'student_attendance': {
          const att = payload.attendance;
          const rows = Object.keys(att).map(sid => ({
            date: payload.date, teacher_id: payload.teacher_id||'', teacher_name: payload.teacher_name||'',
            subject_id: payload.subject_id||'', subject_name: payload.subject_name||'',
            class: payload.class_id||'', student_id: sid, status: att[sid]
          }));
          await sbPost('student_attendance', rows, 'date,teacher_id,subject_id,student_id');
          break;
        }
        case 'daily_attendance': {
          const att2 = payload.attendance;
          const rows = Object.keys(att2).map(sid => ({
            date: payload.date, slot: payload.slot||'', marked_by: payload.marked_by||'',
            marked_by_name: payload.marked_by_name||'', student_id: sid, status: att2[sid]
          }));
          await sbPost('daily_attendance', rows, 'date,slot,student_id');
          break;
        }
        case 'teacher_attendance': {
          const ta = payload.attendance;
          const rows = Object.keys(ta).map(tid => ({
            date: payload.date, teacher_id: tid, teacher_name: '',
            status: ta[tid], marked_by: payload.teacher_id||'admin', approved: false
          }));
          await sbPost('teacher_attendance', rows, 'date,teacher_id');
          break;
        }
        case 'student_upsert': {
          const s = payload.student || payload;
          const h = s.hifz || {};
          await sbPost('students', {
            id: s.id||s.student_id, name: s.n||s.name||'', parent: s.parent||'',
            phone: s.phone||'', residence: s.residence||'',
            class: s.c||s.class_id||'', qari_id: s.qari||null, status: s.status||'active',
            hifz_paras: h.paras||0, hifz_soorah: h.soorah||'', hifz_aayat: h.aayat||0, hifz_daur: h.daur_para||''
          }, 'id');
          break;
        }
        case 'bulk_students': {
          const rows = payload.students.map(s => {
            const h = s.hifz || {};
            return {
              id: s.id||'', name: s.n||s.name||'', parent: s.parent||'',
              phone: s.phone||'', residence: s.residence||'',
              class: s.c||s.class_id||'', qari_id: s.qari||null, status: s.status||'active',
              hifz_paras: h.paras||0, hifz_soorah: h.soorah||'', hifz_aayat: h.aayat||0, hifz_daur: h.daur_para||''
            };
          });
          await sbPost('students', rows, 'id');
          break;
        }
        default:
          console.log('[SYNC] unknown type:', type);
      }
      setSyncSt('ok');
      setTimeout(() => setSyncSt(null), 3000);
      return { success: true };
    } catch (e) {
      console.error('[SYNC] error:', type, e);
      setSyncSt('error');
      setTimeout(() => setSyncSt(null), 3000);
      delete syncSentRef.current[dk];
      return { success: false, error: e.message };
    }
  };
  const processQ = async () => {
    if (!syncQ.length || !cfg.supabase_url) return;
    const it = syncQ[0];
    const r = await syncPost(it.type, it.payload);
    if (r.success) {
      setSyncQ(p => p.slice(1));
      flash('✓');
    }
  };
  const syncAttendance = async (classId, subjectId) => {
    const todayDt = new Date().toISOString().split('T')[0];
    const aKey = classId + '_' + todayDt;
    const att = sAttend[aKey];
    if (!att || !Object.keys(att).length) { flash('⚠️ خالی'); return; }
    const tName = user ? (teachers.find(t => t.id === user.id) || {}).n || '' : '';
    const subObj = subjectId ? gS(subjectId) : null;
    const pl = { teacher_id: user ? user.id : '', teacher_name: tName, class_id: classId, subject_id: subjectId || '', subject_name: subObj ? subObj.n : '', date: todayDt, attendance: att };
    console.log('[ATTEND] sending:', JSON.stringify(pl));
    if (cfg.supabase_url) {
      flash('⏳ بھیج رہے ہیں...');
      try {
        const res = await syncPost('student_attendance', pl);
        console.log('[ATTEND] response:', JSON.stringify(res));
        if (res && res.success) flash('✅ حاضری محفوظ — ' + Object.keys(att).length + ' طلبا');
        else flash('❌ ناکام: ' + (res && res.error ? res.error : JSON.stringify(res)));
      } catch(err) {
        console.error('[ATTEND] error:', err);
        flash('❌ ' + err.message);
      }
    } else { setSyncQ(p => [...p, { type: 'student_attendance', payload: pl }]); flash('✓ قطار — URL سیٹ کریں'); }
  };
  const syncDailyAttendance = async (slot) => {
    const todayDt = new Date().toISOString().split('T')[0];
    const daKey = slot + '_' + todayDt;
    const att = dAttend[daKey];
    if (!att || !Object.keys(att).length) { flash('⚠️ خالی'); return; }
    const tName = user ? (teachers.find(t => t.id === user.id) || {}).n || '' : '';
    const pl = { marked_by: user ? user.id : '', marked_by_name: tName, slot: slot, date: todayDt, attendance: att };
    console.log('[DATTEND] sending:', JSON.stringify(pl));
    if (cfg.supabase_url) {
      flash('⏳ بھیج رہے ہیں...');
      try {
        const res = await syncPost('daily_attendance', pl);
        console.log('[DATTEND] response:', JSON.stringify(res));
        if (res && res.success) flash('✅ حاضری محفوظ — ' + Object.keys(att).length + ' طلبا');
        else flash('❌ ناکام: ' + (res && res.error ? res.error : JSON.stringify(res)));
      } catch(err) { console.error('[DATTEND] error:', err); flash('❌ ' + err.message); }
    } else { setSyncQ(p => [...p, { type: 'daily_attendance', payload: pl }]); flash('✓ قطار'); }
  };
  useEffect(() => {
    const iv = setInterval(() => {
      if (syncQ.length && cfg && cfg.supabase_url && navigator.onLine) processQ();
    }, 300000);
